<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>404 – الصفحة غير موجودة</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Cairo:wght@300..700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
        body { background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; margin: 0; }
        .error-card { background: #fff; border-radius: 24px; padding: 3rem 2.5rem; max-width: 480px; width: 100%; text-align: center; border: 1px solid #e5e5e5; box-shadow: 0 16px 48px -12px rgba(0,0,0,0.08); }
        .error-card .icon { font-size: 4rem; color: #000; margin-bottom: 1rem; }
        .error-card h1 { font-size: 5rem; font-weight: 800; color: #000; margin: 0; line-height: 1; }
        .error-card h2 { font-size: 1.5rem; font-weight: 700; color: #000; margin-top: 0.5rem; }
        .error-card p { color: #555; margin-top: 0.5rem; font-size: 0.95rem; }
        .error-card .btn { display: inline-block; margin-top: 1.5rem; padding: 0.7rem 2rem; background: #000; color: #fff; border-radius: 9999px; font-weight: 600; text-decoration: none; transition: all 0.3s ease; }
        .error-card .btn:hover { background: #222; transform: translateY(-2px); box-shadow: 0 8px 24px -6px rgba(0,0,0,0.2); }
        @media (max-width: 480px) { .error-card { padding: 2rem 1.5rem; } .error-card h1 { font-size: 4rem; } }
    </style>
</head>
<body>
    <div class="error-card" data-aos="zoom-in" data-aos-duration="500">
        <div class="icon"><i class="fas fa-feather-alt"></i></div>
        <h1>404</h1>
        <h2>الصفحة غير موجودة</h2>
        <p>عذراً، لا يمكننا العثور على الصفحة التي تبحث عنها. قد تكون تم نقلها أو حذفها.</p>
        <a href="index.html" class="btn"><i class="fas fa-arrow-left ml-2"></i> العودة إلى الرئيسية</a>
    </div>
    <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
    <script> AOS.init({ duration: 500, once: true }); </script>
</body>
</html>
