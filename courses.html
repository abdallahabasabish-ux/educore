<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الكورسات – مداد العلم</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

  <style>
    /* نفس التنسيقات السابقة مع إضافة تنسيق البطاقات */
    .course-card { transition: all 0.3s ease; }
    .course-card:hover { transform: translateY(-4px); box-shadow: 0 12px 30px -8px rgba(0,0,0,0.1); }
  </style>
</head>
<body>
  <!-- نفس القائمة الجانبية الموجودة في students.html (انسخها هنا) -->
  <!-- ... القائمة الجانبية ... -->
  <div class="main-content">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">إدارة الكورسات</h1>
      <button id="add-course-btn" class="btn-primary flex items-center gap-2"><i class="fas fa-plus"></i> إضافة كورس</button>
    </div>
    <div id="courses-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="col-span-full text-center text-gray-500 py-8">جاري التحميل...</div>
    </div>
  </div>

  <!-- مودال إضافة/تعديل كورس -->
  <div id="course-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="flex justify-between items-center mb-4">
        <h2 id="modal-title" class="text-xl font-bold">إضافة كورس جديد</h2>
        <button id="close-modal" class="text-gray-500 hover:text-gray-700 text-xl"><i class="fas fa-times"></i></button>
      </div>
      <form id="course-form">
        <input type="hidden" id="course-id" />
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700">عنوان الكورس</label>
          <input type="text" id="course-title" class="form-input" placeholder="مقدمة في البرمجة" required />
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700">الوصف</label>
          <textarea id="course-description" rows="3" class="form-input" placeholder="وصف الكورس..."></textarea>
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700">المدرس</label>
          <input type="text" id="course-teacher" class="form-input" placeholder="أحمد محمد" />
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700">المدة (ساعات)</label>
          <input type="number" id="course-duration" class="form-input" placeholder="10" />
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700">السعر ($)</label>
          <input type="number" id="course-price" class="form-input" placeholder="0" />
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700">الحالة</label>
          <select id="course-status" class="form-input">
            <option value="active">نشط</option>
            <option value="draft">مسودة</option>
          </select>
        </div>
        <button type="submit" class="btn-primary w-full">حفظ</button>
      </form>
    </div>
  </div>

  <script>
    // نفس كود التحكم بالمودال والقائمة الجانبية (انسخه من students.html)
  </script>
  <script type="module" src="assets/js/pages/courses.js"></script>
</body>
</html>
