<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>العملاء – EduCore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo&display=swap" rel="stylesheet" />
</head>
<body class="bg-gray-50">
  <!-- نفس القائمة الجانبية (يمكن تضمينها عبر JS أو نسخها) -->
  <div id="sidebar" class="fixed top-0 right-0 w-64 h-full bg-white border-l border-gray-200 p-4 overflow-y-auto">
    <a href="/" class="text-2xl font-bold text-[#4B5563] block mb-8">EduCore</a>
    <nav class="space-y-2">
      <a href="/dashboard" class="block px-4 py-2 rounded-lg hover:bg-gray-100 transition">لوحة التحكم</a>
      <a href="/customers" class="block px-4 py-2 rounded-lg bg-[#4B5563] text-white">العملاء</a>
      <!-- باقي الروابط -->
      <button id="logout-btn" class="block w-full text-right px-4 py-2 rounded-lg text-red-600 hover:bg-red-50 transition">تسجيل الخروج</button>
    </nav>
  </div>

  <div class="mr-64 p-6">
    <h1 class="text-2xl font-bold mb-6">العملاء</h1>
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
      <div class="flex justify-between items-center mb-4">
        <input type="text" placeholder="بحث..." class="border border-gray-300 rounded-xl px-4 py-2 w-64" />
        <button class="bg-[#4B5563] text-white px-4 py-2 rounded-xl hover:bg-[#3b4553] transition">إضافة عميل</button>
      </div>
      <div id="customers-list" class="space-y-2">
        <p class="text-sm text-gray-500">جاري التحميل...</p>
      </div>
    </div>
  </div>

  <script type="module" src="assets/js/pages/customers.js"></script>
</body>
</html>
