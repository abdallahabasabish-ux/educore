<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>لوحة التحكم – مداد العلم</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50">
  <!-- القائمة الجانبية -->
  <div class="fixed top-0 right-0 w-64 h-full bg-white border-l border-gray-200 p-4 overflow-y-auto z-40">
    <a href="/" class="text-2xl font-extrabold text-[#4B5563] block mb-8"><i class="fas fa-feather-alt ml-2"></i>مداد العلم</a>
    <nav class="space-y-1">
      <a href="/dashboard" class="sidebar-link active"><i class="fas fa-chart-pie ml-2"></i>لوحة التحكم</a>
      <a href="/customers" class="sidebar-link"><i class="fas fa-users ml-2"></i>العملاء</a>
      <a href="/cases" class="sidebar-link"><i class="fas fa-folder-open ml-2"></i>القضايا</a>
      <a href="/sessions" class="sidebar-link"><i class="fas fa-calendar-check ml-2"></i>الجلسات</a>
      <a href="/documents" class="sidebar-link"><i class="fas fa-file-alt ml-2"></i>المستندات</a>
      <a href="/contracts" class="sidebar-link"><i class="fas fa-file-signature ml-2"></i>العقود</a>
      <a href="/consultations" class="sidebar-link"><i class="fas fa-comments ml-2"></i>الاستشارات</a>
      <a href="/tasks" class="sidebar-link"><i class="fas fa-tasks ml-2"></i>المهام</a>
      <a href="/calendar" class="sidebar-link"><i class="fas fa-calendar-alt ml-2"></i>التقويم</a>
      <a href="/notifications" class="sidebar-link"><i class="fas fa-bell ml-2"></i>الإشعارات</a>
      <a href="/reports" class="sidebar-link"><i class="fas fa-chart-bar ml-2"></i>التقارير</a>
      <a href="/accounting" class="sidebar-link"><i class="fas fa-coins ml-2"></i>المحاسبة</a>
      <a href="/employees" class="sidebar-link"><i class="fas fa-user-tie ml-2"></i>الموظفون</a>
      <a href="/settings" class="sidebar-link"><i class="fas fa-cog ml-2"></i>الإعدادات</a>
      <a href="/profile" class="sidebar-link"><i class="fas fa-user ml-2"></i>الملف الشخصي</a>
      <button id="logout-btn" class="sidebar-link text-red-600 hover:bg-red-50 w-full text-right"><i class="fas fa-sign-out-alt ml-2"></i>تسجيل الخروج</button>
    </nav>
  </div>

  <!-- المحتوى الرئيسي -->
  <div class="mr-64 p-6">
    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">لوحة التحكم</h1>
      <div class="flex items-center gap-4">
        <span id="user-name" class="text-sm font-medium">مرحباً، مستخدم</span>
        <img id="user-avatar" src="https://ui-avatars.com/api/?name=U&size=40" alt="صورة المستخدم" class="w-10 h-10 rounded-full border-2 border-gray-200" />
      </div>
    </div>

    <!-- بطاقات الإحصائيات -->
    <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-4 gap-6 mb-8">
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition" data-aos="fade-up" data-aos-delay="100">
        <p class="text-sm text-gray-500">إجمالي العملاء</p>
        <p class="text-2xl font-bold" id="total-customers">0</p>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition" data-aos="fade-up" data-aos-delay="150">
        <p class="text-sm text-gray-500">القضايا النشطة</p>
        <p class="text-2xl font-bold" id="active-cases">0</p>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition" data-aos="fade-up" data-aos-delay="200">
        <p class="text-sm text-gray-500">الجلسات اليوم</p>
        <p class="text-2xl font-bold" id="today-sessions">0</p>
      </div>
      <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200 hover:shadow-md transition" data-aos="fade-up" data-aos-delay="250">
        <p class="text-sm text-gray-500">المهام المعلقة</p>
        <p class="text-2xl font-bold" id="pending-tasks">0</p>
      </div>
    </div>

    <!-- آخر النشاطات -->
    <div class="bg-white p-6 rounded-xl shadow-sm border border-gray-200">
      <h2 class="text-lg font-semibold mb-4">آخر النشاطات</h2>
      <div id="recent-activity" class="space-y-2">
        <p class="text-sm text-gray-500">لا توجد أنشطة حديثة</p>
      </div>
    </div>
  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>
  <script>
    AOS.init({ duration: 800, once: true });
    const lenis = new Lenis({ duration: 1.2 });
    function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
    requestAnimationFrame(raf);
  </script>
  <script type="module" src="assets/js/dashboard.js"></script>
</body>
</html>
