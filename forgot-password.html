<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>استعادة كلمة المرور – مداد العلم</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Cairo:wght@300..700&display=swap" rel="stylesheet" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- Lenis CSS -->
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.13/dist/lenis.css" />

    <!-- Toastify -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Main CSS -->
    <link rel="stylesheet" href="assets/css/style.css" />

    <style>
        /* ===== تنسيقات خاصة بصفحة استعادة كلمة المرور ===== */
        body {
            background: #f1f5f9;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            margin: 0;
        }

        .auth-card {
            background: white;
            border-radius: 20px;
            padding: 2rem 1.75rem;
            max-width: 440px;
            width: 100%;
            box-shadow: 0 20px 60px -12px rgba(0, 0, 0, 0.12);
            transition: all 0.3s ease;
        }

        .auth-logo {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .auth-logo i {
            font-size: 2.2rem;
            color: #2563EB;
        }
        .auth-logo h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-top: 0.25rem;
            color: #111827;
        }
        .auth-logo p {
            color: #64748b;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        /* ===== الحقول ===== */
        .form-group {
            margin-bottom: 1.25rem;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.35rem;
        }
        .form-control {
            width: 100%;
            padding: 0.6rem 0.875rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            background: #f8fafc;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            color: #111827;
        }
        .form-control:focus {
            outline: none;
            border-color: #2563EB;
            background: white;
            box-shadow: 0 0 0 3px rgba(37, 99, 235, 0.1);
        }
        .form-control::placeholder {
            color: #94a3b8;
        }

        /* ===== الأزرار ===== */
        .btn-primary {
            background: #2563EB;
            color: white;
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 48px;
        }
        .btn-primary:hover {
            background: #1D4ED8;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px -6px rgba(37, 99, 235, 0.3);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-primary:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        /* ===== رسائل ===== */
        .message-box {
            padding: 0.6rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-top: 0.75rem;
            display: none;
        }
        .message-box.error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .message-box.success {
            display: block;
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        /* ===== روابط ===== */
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #64748b;
        }
        .auth-footer a {
            color: #2563EB;
            font-weight: 600;
            text-decoration: none;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* ===== استجابة الهواتف ===== */
        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem 1.25rem;
                border-radius: 16px;
            }
            .auth-logo i {
                font-size: 1.8rem;
            }
            .auth-logo h1 {
                font-size: 1.25rem;
            }
            .form-control {
                padding: 0.5rem 0.75rem;
                font-size: 0.85rem;
            }
            .btn-primary {
                font-size: 0.85rem;
                min-height: 44px;
                padding: 0.6rem 1rem;
            }
            .auth-footer {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 360px) {
            .auth-card {
                padding: 1.25rem 1rem;
            }
            .auth-logo h1 {
                font-size: 1.1rem;
            }
            .auth-logo p {
                font-size: 0.75rem;
            }
            .btn-primary {
                font-size: 0.8rem;
                min-height: 40px;
                padding: 0.5rem 0.75rem;
            }
        }

        @media (min-width: 1024px) {
            .auth-card {
                padding: 2.5rem;
            }
            .auth-logo i {
                font-size: 2.5rem;
            }
            .auth-logo h1 {
                font-size: 1.75rem;
            }
        }
    </style>
</head>
<body>

    <!-- ======== بطاقة استعادة كلمة المرور ======== -->
    <div class="auth-card">

        <!-- Logo -->
        <div class="auth-logo">
            <i class="fas fa-feather-alt"></i>
            <h1>مداد العلم</h1>
            <p>استعادة كلمة المرور</p>
        </div>

        <p class="text-sm text-[#4B5563] text-center mb-4">
            أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور.
        </p>

        <!-- ===== نموذج استعادة كلمة المرور ===== -->
        <form id="forgotForm" novalidate>

            <!-- البريد الإلكتروني -->
            <div class="form-group">
                <label for="forgotEmail">البريد الإلكتروني</label>
                <input type="email" id="forgotEmail" class="form-control" placeholder="example@email.com" required autocomplete="email" />
            </div>

            <!-- رسائل الخطأ/النجاح -->
            <div id="forgotMessage" class="message-box"></div>

            <!-- زر إرسال -->
            <button type="submit" class="btn-primary" id="forgotBtn">
                <i class="fas fa-paper-plane"></i> إرسال رابط الاستعادة
            </button>

        </form>

        <!-- ===== رابط العودة لتسجيل الدخول ===== -->
        <div class="auth-footer">
            تذكرت كلمة المرور؟ <a href="login.html">تسجيل الدخول</a>
        </div>

    </div>

    <!-- ======== SCRIPTS ======== -->
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <!-- Import Map for Firebase -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"
            }
        }
    </script>

    <script type="module">
        // ============================================================
        // forgot-password.js – استعادة كلمة المرور مع Firebase
        // ============================================================

        import { initializeApp } from "firebase/app";
        import { getAuth, sendPasswordResetEmail } from "firebase/auth";

        // ===== Firebase Config =====
        const firebaseConfig = {
            apiKey: "AIzaSyBsSP8Le5_nDG2YFiyGcZ6BFR7aLi3djLU",
            authDomain: "edu-core-ddb48.firebaseapp.com",
            projectId: "edu-core-ddb48",
            storageBucket: "edu-core-ddb48.firebasestorage.app",
            messagingSenderId: "4743644287",
            appId: "1:4743644287:web:9167749cc80417b6876b4a",
            measurementId: "G-S94FBCFCXW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);

        // ===== عناصر DOM =====
        const forgotForm = document.getElementById('forgotForm');
        const messageEl = document.getElementById('forgotMessage');
        const forgotBtn = document.getElementById('forgotBtn');
        const emailInput = document.getElementById('forgotEmail');

        // ===== دالة عرض الرسائل =====
        function showMessage(text, type = 'error') {
            messageEl.textContent = text;
            messageEl.className = `message-box ${type}`;
            clearTimeout(messageEl._timeout);
            messageEl._timeout = setTimeout(() => {
                messageEl.className = 'message-box';
                messageEl.textContent = '';
            }, 5000);
        }

        // ===== دالة تعطيل الزر أثناء التحميل =====
        function setLoading(isLoading) {
            if (isLoading) {
                forgotBtn.disabled = true;
                forgotBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...';
            } else {
                forgotBtn.disabled = false;
                forgotBtn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال رابط الاستعادة';
            }
        }

        // ===== إرسال رابط استعادة كلمة المرور =====
        forgotForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const email = emailInput.value.trim();

            if (!email) {
                showMessage('يرجى إدخال البريد الإلكتروني', 'error');
                return;
            }

            // التحقق من صحة البريد
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('البريد الإلكتروني غير صحيح', 'error');
                return;
            }

            setLoading(true);

            try {
                await sendPasswordResetEmail(auth, email, {
                    url: window.location.origin + '/login.html',
                    handleCodeInApp: false,
                });

                showMessage('تم إرسال رابط استعادة كلمة المرور إلى بريدك الإلكتروني. يرجى التحقق من صندوق الوارد.', 'success');

                // إعادة تعيين الحقل بعد 2 ثانية
                setTimeout(() => {
                    emailInput.value = '';
                }, 2000);

            } catch (error) {
                let msg = 'فشل إرسال رابط الاستعادة';
                if (error.code === 'auth/user-not-found') {
                    msg = 'لا يوجد حساب مرتبط بهذا البريد الإلكتروني';
                } else if (error.code === 'auth/invalid-email') {
                    msg = 'البريد الإلكتروني غير صحيح';
                } else if (error.code === 'auth/too-many-requests') {
                    msg = 'تم إرسال العديد من الطلبات، حاول لاحقاً';
                } else if (error.code === 'auth/network-request-failed') {
                    msg = 'فشل الاتصال بالشبكة، تأكد من اتصال الإنترنت';
                } else {
                    msg = error.message;
                }
                showMessage(msg, 'error');
            } finally {
                setLoading(false);
            }
        });

        // ===== إزالة الرسائل عند الكتابة =====
        emailInput.addEventListener('input', () => {
            if (messageEl.className !== 'message-box') {
                messageEl.className = 'message-box';
                messageEl.textContent = '';
            }
        });

        // ===== Lenis Smooth Scroll =====
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            orientation: 'vertical',
            gestureOrientation: 'vertical',
            smoothWheel: true,
            wheelMultiplier: 1,
            touchMultiplier: 2,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        console.log('✅ مداد العلم — صفحة استعادة كلمة المرور جاهزة');
    </script>

</body>
</html>
