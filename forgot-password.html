<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>نسيت كلمة المرور – مداد العلم</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Cairo:wght@300..700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.13/dist/lenis.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="assets/css/style.css" />
    <style>
        body { background: #f5f5f5; display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 1rem; margin: 0; }
        .auth-card { background: #fff; border-radius: 20px; padding: 2rem 1.75rem; max-width: 420px; width: 100%; box-shadow: 0 16px 48px -12px rgba(0,0,0,0.08); border: 1px solid #e5e5e5; }
        .auth-logo { text-align: center; margin-bottom: 1.75rem; }
        .auth-logo i { font-size: 2.2rem; color: #000; }
        .auth-logo h1 { font-size: 1.5rem; font-weight: 800; margin-top: 0.25rem; color: #000; }
        .auth-logo p { color: #555; font-size: 0.875rem; margin-top: 0.25rem; }
        .form-group { margin-bottom: 1.1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #000; margin-bottom: 0.3rem; }
        .form-control { width: 100%; padding: 0.55rem 0.875rem; border: 1.5px solid #e5e5e5; border-radius: 10px; background: #fafafa; font-size: 0.9rem; transition: all 0.2s ease; color: #111827; }
        .form-control:focus { outline: none; border-color: #000; background: #fff; box-shadow: 0 0 0 3px rgba(0,0,0,0.05); }
        .form-control::placeholder { color: #94a3b8; }
        .btn-primary { background: #000; color: #fff; padding: 0.7rem 1.5rem; border-radius: 10px; font-weight: 600; font-size: 0.95rem; border: none; cursor: pointer; transition: all 0.3s ease; width: 100%; display: flex; align-items: center; justify-content: center; gap: 0.5rem; min-height: 48px; }
        .btn-primary:hover { background: #222; transform: translateY(-2px); box-shadow: 0 8px 24px -6px rgba(0,0,0,0.2); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }
        .message-box { padding: 0.5rem 1rem; border-radius: 10px; font-size: 0.85rem; margin-top: 0.5rem; display: none; }
        .message-box.error { display: block; background: #fee2e2; color: #991b1b; border: 1px solid #fecaca; }
        .message-box.success { display: block; background: #dcfce7; color: #166534; border: 1px solid #bbf7d0; }
        .auth-footer { text-align: center; margin-top: 1.5rem; font-size: 0.9rem; color: #555; }
        .auth-footer a { color: #000; font-weight: 600; text-decoration: none; }
        .auth-footer a:hover { text-decoration: underline; }
        @media (max-width: 480px) { .auth-card { padding: 1.5rem 1.25rem; } .auth-logo i { font-size: 1.8rem; } .auth-logo h1 { font-size: 1.25rem; } .form-control { padding: 0.5rem 0.75rem; font-size: 0.85rem; } .btn-primary { font-size: 0.85rem; min-height: 44px; padding: 0.6rem 1rem; } }
    </style>
</head>
<body>
    <div class="auth-card">
        <div class="auth-logo"><i class="fas fa-feather-alt"></i><h1>مداد العلم</h1><p>استعادة كلمة المرور</p></div>
        <p class="text-sm text-[#4B5563] text-center mb-4">أدخل بريدك الإلكتروني وسنرسل لك رابطاً لإعادة تعيين كلمة المرور.</p>
        <form id="forgotForm">
            <div class="form-group"><label for="forgotEmail">البريد الإلكتروني</label><input type="email" id="forgotEmail" class="form-control" placeholder="example@email.com" required /></div>
            <div id="forgotMessage" class="message-box"></div>
            <button type="submit" class="btn-primary" id="forgotBtn"><i class="fas fa-paper-plane"></i> إرسال رابط الاستعادة</button>
        </form>
        <div class="auth-footer">تذكرت كلمة المرور؟ <a href="login.html">تسجيل الدخول</a></div>
    </div>
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>
    <script type="importmap">{"imports":{"firebase/app":"https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js","firebase/auth":"https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js","firebase/firestore":"https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js","firebase/storage":"https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"}}</script>
    <script type="module">
        import { initializeApp } from "firebase/app"; import { getAuth, sendPasswordResetEmail } from "firebase/auth";
        const firebaseConfig = { apiKey: "AIzaSyBsSP8Le5_nDG2YFiyGcZ6BFR7aLi3djLU", authDomain: "edu-core-ddb48.firebaseapp.com", projectId: "edu-core-ddb48", storageBucket: "edu-core-ddb48.firebasestorage.app", messagingSenderId: "4743644287", appId: "1:4743644287:web:9167749cc80417b6876b4a", measurementId: "G-S94FBCFCXW" };
        const app = initializeApp(firebaseConfig); const auth = getAuth(app);
        const form = document.getElementById('forgotForm'), messageEl = document.getElementById('forgotMessage'), forgotBtn = document.getElementById('forgotBtn'), emailInput = document.getElementById('forgotEmail');
        function showMessage(text, type='error') { messageEl.textContent = text; messageEl.className = `message-box ${type}`; clearTimeout(messageEl._timeout); messageEl._timeout = setTimeout(() => { messageEl.className = 'message-box'; messageEl.textContent = ''; }, 5000); }
        function setLoading(isLoading) { if (isLoading) { forgotBtn.disabled = true; forgotBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإرسال...'; } else { forgotBtn.disabled = false; forgotBtn.innerHTML = '<i class="fas fa-paper-plane"></i> إرسال رابط الاستعادة'; } }
        form.addEventListener('submit', async (e) => {
            e.preventDefault(); const email = emailInput.value.trim();
            if (!email) { showMessage('يرجى إدخال البريد الإلكتروني', 'error'); return; }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/; if (!emailRegex.test(email)) { showMessage('البريد الإلكتروني غير صحيح', 'error'); return; }
            setLoading(true);
            try { await sendPasswordResetEmail(auth, email, { url: window.location.origin + '/login.html', handleCodeInApp: false }); showMessage('تم إرسال رابط الاستعادة إلى بريدك الإلكتروني', 'success'); emailInput.value = ''; } catch (error) { let msg = 'فشل الإرسال'; if (error.code === 'auth/user-not-found') msg = 'لا يوجد حساب بهذا البريد'; else msg = error.message; showMessage(msg, 'error'); }
            finally { setLoading(false); }
        });
        emailInput.addEventListener('input', () => { if (messageEl.className !== 'message-box') { messageEl.className = 'message-box'; messageEl.textContent = ''; } });
        const lenis = new Lenis({ duration: 1.2 }); function raf(time) { lenis.raf(time); requestAnimationFrame(raf); } requestAnimationFrame(raf);
        console.log('✅ forgot-password.html ready');
    </script>
</body>
</html>
