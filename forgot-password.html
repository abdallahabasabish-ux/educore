<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>استعادة كلمة المرور – EduCore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-50 to-gray-100 p-4">
  <div class="w-full max-w-md">
    <div class="bg-white/80 backdrop-blur-lg rounded-3xl shadow-2xl border border-white/30 p-8">
      <div class="text-center mb-8">
        <a href="/" class="text-3xl font-extrabold text-[#4B5563]"><i class="fas fa-graduation-cap ml-2"></i>EduCore</a>
        <h2 class="text-2xl font-bold mt-4">نسيت كلمة المرور؟</h2>
        <p class="text-gray-500 text-sm">أدخل بريدك الإلكتروني وسنرسل لك رابط إعادة التعيين</p>
      </div>

      <form id="forgot-password-form" class="space-y-4">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">البريد الإلكتروني</label>
          <div class="relative">
            <i class="fas fa-envelope absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="email" id="email" required class="w-full rounded-xl border border-gray-300 bg-gray-50/50 pl-4 pr-10 py-2.5 focus:ring-2 focus:ring-[#4B5563] focus:border-transparent transition" placeholder="example@email.com" />
          </div>
        </div>
        <button type="submit" class="w-full bg-[#4B5563] text-white py-2.5 rounded-xl hover:bg-[#3b4553] transition font-semibold shadow-md hover:shadow-lg">إرسال رابط الاستعادة</button>
      </form>

      <p class="text-center text-sm text-gray-500 mt-6">
        تذكرت كلمة المرور؟ <a href="/login" class="text-[#4B5563] font-semibold hover:underline">تسجيل الدخول</a>
      </p>
    </div>
  </div>

  <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
