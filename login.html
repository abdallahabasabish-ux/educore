<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول – مداد العلم</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-50 to-gray-100 p-4">
  <div class="w-full max-w-md" data-aos="zoom-in" data-aos-duration="800">
    <div class="bg-white/80 backdrop-blur-lg rounded-3xl shadow-2xl border border-white/30 p-8 transform transition-all hover:scale-[1.02] duration-300">
      <div class="text-center mb-8">
        <a href="/" class="text-3xl font-extrabold text-[#4B5563]"><i class="fas fa-feather-alt ml-2"></i>مداد العلم</a>
        <h2 class="text-2xl font-bold mt-4">مرحباً بعودتك</h2>
        <p class="text-gray-500 text-sm">تسجيل الدخول إلى حسابك</p>
      </div>

      <form id="login-form" class="space-y-5">
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">البريد الإلكتروني</label>
          <div class="relative">
            <i class="fas fa-envelope absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="email" id="email" required class="form-input pr-10" placeholder="example@email.com" />
          </div>
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">كلمة المرور</label>
          <div class="relative">
            <i class="fas fa-lock absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" id="password" required class="form-input pr-10" placeholder="••••••••" />
          </div>
        </div>
        <div class="flex items-center justify-between text-sm">
          <label class="flex items-center gap-2 cursor-pointer">
            <input type="checkbox" id="remember" class="rounded border-gray-300 text-[#4B5563] focus:ring-[#4B5563]" />
            <span class="text-gray-600">تذكرني</span>
          </label>
          <a href="/forgot-password" class="text-[#4B5563] hover:underline">نسيت كلمة المرور؟</a>
        </div>
        <button type="submit" class="w-full bg-[#4B5563] text-white py-2.5 rounded-xl hover:bg-[#3b4553] transition font-semibold shadow-md hover:shadow-lg">تسجيل الدخول</button>
      </form>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
        <div class="relative flex justify-center text-xs text-gray-400 bg-white/80 px-2">أو</div>
      </div>

      <button id="google-login" class="w-full border border-gray-300 py-2.5 rounded-xl hover:bg-gray-50 transition flex items-center justify-center gap-2 font-medium text-gray-700">
        <i class="fab fa-google text-red-500 text-lg"></i>
        تسجيل الدخول بواسطة Google
      </button>

      <p class="text-center text-sm text-gray-500 mt-6">
        ليس لديك حساب؟ <a href="/register" class="text-[#4B5563] font-semibold hover:underline">إنشاء حساب</a>
      </p>
    </div>
  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>
  <script>
    AOS.init({ duration: 800, once: true });
    const lenis = new Lenis({ duration: 1.2 });
    function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
    requestAnimationFrame(raf);
  </script>
  <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
