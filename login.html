<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول – EduCore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo&display=swap" rel="stylesheet" />
</head>
<body class="bg-gray-50 flex items-center justify-center min-h-screen">
  <div class="bg-white rounded-2xl shadow-lg border border-gray-200 p-8 w-full max-w-md">
    <div class="text-center mb-8">
      <h1 class="text-2xl font-bold text-[#4B5563]">EduCore</h1>
      <p class="text-sm text-gray-500 mt-1">تسجيل الدخول إلى حسابك</p>
    </div>
    <form id="login-form" class="space-y-4">
      <div>
        <label for="email" class="block text-sm font-medium text-gray-700">البريد الإلكتروني</label>
        <input type="email" id="email" required class="mt-1 w-full rounded-xl border border-gray-300 px-4 py-2 focus:ring-2 focus:ring-[#4B5563] focus:outline-none" placeholder="example@email.com" />
      </div>
      <div>
        <label for="password" class="block text-sm font-medium text-gray-700">كلمة المرور</label>
        <input type="password" id="password" required class="mt-1 w-full rounded-xl border border-gray-300 px-4 py-2 focus:ring-2 focus:ring-[#4B5563] focus:outline-none" placeholder="••••••••" />
      </div>
      <div class="flex items-center justify-between text-sm">
        <label class="flex items-center gap-2"><input type="checkbox" id="remember" /> تذكرني</label>
        <a href="/forgot-password" class="text-[#4B5563] hover:underline">نسيت كلمة المرور؟</a>
      </div>
      <button type="submit" class="w-full bg-[#4B5563] text-white py-2 rounded-xl hover:bg-[#3b4553] transition font-medium">تسجيل الدخول</button>
    </form>
    <div class="relative my-6">
      <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
      <div class="relative flex justify-center text-xs text-gray-400 bg-white px-2">أو</div>
    </div>
    <button id="google-login" class="w-full border border-gray-300 py-2 rounded-xl hover:bg-gray-50 transition flex items-center justify-center gap-2">
      <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
      تسجيل الدخول بواسطة Google
    </button>
    <p class="text-center text-sm text-gray-500 mt-4">ليس لديك حساب؟ <a href="/register" class="text-[#4B5563] hover:underline">إنشاء حساب</a></p>
  </div>
  <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
