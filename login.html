<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>تسجيل الدخول – مداد العلم</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet">
  <link href="https://unpkg.com/aos@2.3.1/dist/aos.css" rel="stylesheet">
  <style>
    /* تنسيقات مخصصة */
    body {
      font-family: 'Inter', 'Cairo', sans-serif;
      direction: rtl;
      background: #f8fafc;
    }
    .login-card {
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
      background: rgba(255, 255, 255, 0.85);
      border: 1px solid rgba(255, 255, 255, 0.3);
    }
    .login-image {
      background: linear-gradient(135deg, #4B5563 0%, #1f2937 100%);
      position: relative;
      overflow: hidden;
    }
    .login-image::after {
      content: '';
      position: absolute;
      top: -50%;
      right: -50%;
      width: 200%;
      height: 200%;
      background: radial-gradient(circle at 30% 50%, rgba(255,255,255,0.05) 0%, transparent 60%);
      animation: pulse 8s ease-in-out infinite;
    }
    @keyframes pulse {
      0%, 100% { transform: scale(1); opacity: 0.3; }
      50% { transform: scale(1.2); opacity: 0.6; }
    }
    .login-image .content {
      position: relative;
      z-index: 2;
    }
    .input-icon {
      position: absolute;
      right: 1rem;
      top: 50%;
      transform: translateY(-50%);
      color: #9ca3af;
    }
    .input-field {
      width: 100%;
      padding: 0.75rem 1rem 0.75rem 2.5rem;
      border: 1px solid #e5e7eb;
      border-radius: 0.75rem;
      background: #f9fafb;
      transition: all 0.2s;
      font-size: 0.95rem;
    }
    .input-field:focus {
      outline: none;
      border-color: #4B5563;
      box-shadow: 0 0 0 3px rgba(75, 85, 99, 0.15);
      background: white;
    }
    .btn-primary {
      background: #4B5563;
      color: white;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      font-weight: 600;
      transition: all 0.3s;
      width: 100%;
    }
    .btn-primary:hover {
      background: #3b4553;
      transform: translateY(-2px);
      box-shadow: 0 8px 16px -4px rgba(75, 85, 99, 0.3);
    }
    .btn-google {
      border: 1px solid #e5e7eb;
      padding: 0.75rem 1.5rem;
      border-radius: 0.75rem;
      background: white;
      font-weight: 500;
      transition: all 0.2s;
      width: 100%;
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 0.5rem;
    }
    .btn-google:hover {
      background: #f9fafb;
      border-color: #4B5563;
    }
    .divider {
      display: flex;
      align-items: center;
      gap: 1rem;
      margin: 1.5rem 0;
    }
    .divider::before, .divider::after {
      content: '';
      flex: 1;
      height: 1px;
      background: #e5e7eb;
    }
    .divider span {
      color: #9ca3af;
      font-size: 0.8rem;
      font-weight: 500;
      white-space: nowrap;
    }
    /* تنسيق الصورة في الهاتف */
    .mobile-bg {
      background: linear-gradient(135deg, #4B5563 0%, #1f2937 100%);
      position: relative;
      padding: 2rem 1.5rem;
      text-align: center;
      border-radius: 1.5rem 1.5rem 0 0;
    }
    .mobile-bg .icon {
      font-size: 4rem;
      color: white;
      opacity: 0.9;
    }
    .mobile-bg h2 {
      color: white;
      font-size: 1.5rem;
      font-weight: 700;
      margin-top: 0.5rem;
    }
    .mobile-bg p {
      color: rgba(255,255,255,0.7);
      font-size: 0.95rem;
      margin-top: 0.25rem;
    }
    @media (max-width: 768px) {
      .login-card {
        backdrop-filter: none;
        background: white;
        border: none;
        border-radius: 1.5rem;
        box-shadow: 0 20px 60px -12px rgba(0,0,0,0.15);
      }
    }
  </style>
</head>
<body>

  <!-- حاوية رئيسية تأخذ كامل الشاشة -->
  <div class="min-h-screen flex items-center justify-center p-4 bg-gradient-to-br from-gray-50 to-gray-100">

    <!-- بطاقة تسجيل الدخول -->
    <div class="w-full max-w-5xl flex flex-col md:flex-row rounded-3xl overflow-hidden shadow-2xl login-card" data-aos="zoom-in" data-aos-duration="800">

      <!-- ====== الجانب الأيمن: الصورة (يظهر على الكمبيوتر) ====== -->
      <div class="login-image hidden md:flex md:w-1/2 items-center justify-center p-12 text-white">
        <div class="content text-center">
          <div class="text-7xl mb-6">
            <i class="fas fa-feather-alt"></i>
          </div>
          <h1 class="text-3xl font-bold mb-2">مداد العلم</h1>
          <p class="text-white/70 text-lg max-w-sm mx-auto">
            منصة تعليمية متكاملة لإدارة الكورسات والطلاب والامتحانات بكل احترافية.
          </p>
          <div class="mt-8 flex justify-center gap-6 text-sm">
            <div>
              <i class="fas fa-check-circle text-green-400 ml-1"></i>
              <span class="text-white/80">آمنة</span>
            </div>
            <div>
              <i class="fas fa-check-circle text-green-400 ml-1"></i>
              <span class="text-white/80">سريعة</span>
            </div>
            <div>
              <i class="fas fa-check-circle text-green-400 ml-1"></i>
              <span class="text-white/80">متطورة</span>
            </div>
          </div>
          <div class="mt-8 flex justify-center gap-4">
            <span class="text-white/50 text-sm">© 2026 مداد العلم</span>
          </div>
        </div>
      </div>

      <!-- ====== الجانب الأيسر: نموذج تسجيل الدخول ====== -->
      <div class="w-full md:w-1/2 p-8 md:p-12 bg-white/80 backdrop-blur-sm md:backdrop-blur-none">

        <!-- شعار في الهاتف (يظهر فقط على الشاشات الصغيرة) -->
        <div class="md:hidden flex items-center justify-center mb-6">
          <i class="fas fa-feather-alt text-3xl text-[#4B5563] ml-2"></i>
          <span class="text-2xl font-extrabold text-[#4B5563]">مداد العلم</span>
        </div>

        <!-- عنوان النموذج -->
        <div class="text-center md:text-right mb-8">
          <h2 class="text-2xl font-bold text-gray-800">مرحباً بعودتك</h2>
          <p class="text-gray-500 text-sm mt-1">سجل الدخول إلى حسابك لمواصلة رحلتك التعليمية</p>
        </div>

        <!-- نموذج تسجيل الدخول -->
        <form id="login-form" class="space-y-5">
          <!-- البريد الإلكتروني -->
          <div>
            <label for="email" class="block text-sm font-medium text-gray-700 mb-1">البريد الإلكتروني</label>
            <div class="relative">
              <i class="fas fa-envelope input-icon"></i>
              <input type="email" id="email" required class="input-field" placeholder="example@email.com" />
            </div>
          </div>

          <!-- كلمة المرور -->
          <div>
            <label for="password" class="block text-sm font-medium text-gray-700 mb-1">كلمة المرور</label>
            <div class="relative">
              <i class="fas fa-lock input-icon"></i>
              <input type="password" id="password" required class="input-field" placeholder="••••••••" />
            </div>
          </div>

          <!-- خيارات إضافية -->
          <div class="flex items-center justify-between text-sm">
            <label class="flex items-center gap-2 cursor-pointer text-gray-600">
              <input type="checkbox" id="remember" class="rounded border-gray-300 text-[#4B5563] focus:ring-[#4B5563]" />
              تذكرني
            </label>
            <a href="forgot-password.html" class="text-[#4B5563] hover:underline font-medium">نسيت كلمة المرور؟</a>
          </div>

          <!-- زر تسجيل الدخول -->
          <button type="submit" class="btn-primary">
            <i class="fas fa-sign-in-alt ml-2"></i> تسجيل الدخول
          </button>
        </form>

        <!-- الفاصل -->
        <div class="divider">
          <span>أو</span>
        </div>

        <!-- زر Google -->
        <button id="google-login" class="btn-google">
          <i class="fab fa-google text-red-500 text-lg"></i>
          تسجيل الدخول بواسطة Google
        </button>

        <!-- رابط إنشاء حساب -->
        <p class="text-center text-sm text-gray-500 mt-6">
          ليس لديك حساب؟ <a href="register.html" class="text-[#4B5563] font-semibold hover:underline">إنشاء حساب</a>
        </p>
      </div>
    </div>
  </div>

  <!-- ====== سكريبتات ====== -->
  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script src="https://unpkg.com/lenis@1.0.45/dist/lenis.min.js"></script>
  <script>
    AOS.init({ duration: 800, once: true });
    const lenis = new Lenis({ duration: 1.2 });
    function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
    requestAnimationFrame(raf);
  </script>

  <!-- رابط auth.js (نظام المصادقة) -->
  <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
