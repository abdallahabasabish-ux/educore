<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الكورسات – مداد العلم</title>

    <!-- نفس الروابط والإعدادات السابقة -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Cairo:wght@300..700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.13/dist/lenis.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="assets/css/style.css" />

    <style>
        /* نفس التنسيقات السابقة مع إضافة تنسيق البطاقات */
        body { background: #f5f5f5; margin: 0; padding: 0; font-family: 'Inter', 'Cairo', sans-serif; }

        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 280px;
            height: 100%;
            background: #000000;
            color: #aaaaaa;
            padding: 1.5rem;
            overflow-y: auto;
            z-index: 40;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
            border-left: 1px solid #222222;
        }
        .sidebar.open { transform: translateX(0); }
        .sidebar-overlay { position: fixed; inset: 0; background: rgba(0, 0, 0, 0.4); backdrop-filter: blur(4px); z-index: 39; display: none; }
        .sidebar-overlay.show { display: block; }
        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.625rem 0.875rem;
            border-radius: 10px;
            color: #aaaaaa;
            text-decoration: none;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }
        .sidebar-link:hover { background: #1a1a1a; color: #ffffff; }
        .sidebar-link.active { background: #333333; color: #ffffff; }
        .sidebar-link i { width: 1.25rem; text-align: center; }

        .main-content { margin-right: 0; padding: 1rem; min-height: 100vh; transition: margin-right 0.3s ease; }
        .mobile-header { display: flex; align-items: center; justify-content: space-between; padding: 0.75rem 0; margin-bottom: 1rem; }
        .menu-btn { background: none; border: none; font-size: 1.5rem; color: #4b5563; cursor: pointer; padding: 0.25rem; transition: color 0.2s; }
        .menu-btn:hover { color: #000000; }

        .course-card {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #e5e5e5;
            padding: 1.25rem;
            transition: all 0.3s ease;
        }
        .course-card:hover { box-shadow: 0 8px 24px -8px rgba(0, 0, 0, 0.06); transform: translateY(-2px); }
        .badge { display: inline-block; padding: 0.15rem 0.6rem; border-radius: 9999px; font-size: 0.65rem; font-weight: 600; }
        .badge-active { background: #e6f7e6; color: #0a5e0a; }
        .badge-draft { background: #fef3c7; color: #92400e; }

        .btn-sm { padding: 0.25rem 0.6rem; font-size: 0.7rem; min-height: 32px; border-radius: 8px; border: none; cursor: pointer; transition: all 0.2s ease; }
        .btn-edit { background: #000000; color: #ffffff; }
        .btn-edit:hover { background: #222222; }
        .btn-danger { background: #EF4444; color: white; }
        .btn-danger:hover { background: #dc2626; }

        .form-control { width: 100%; padding: 0.55rem 0.875rem; border: 1.5px solid #e5e5e5; border-radius: 10px; background: #fafafa; font-size: 0.9rem; transition: all 0.2s ease; color: #000000; }
        .form-control:focus { outline: none; border-color: #000000; background: #ffffff; box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05); }
        .form-group { margin-bottom: 1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #000000; margin-bottom: 0.3rem; }

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 1.75rem;
            max-width: 560px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn { from { opacity: 0; transform: scale(0.95) translateY(20px); } to { opacity: 1; transform: scale(1) translateY(0); } }

        .btn-primary {
            background: #000000;
            color: #ffffff;
            padding: 0.6rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            min-height: 44px;
        }
        .btn-primary:hover { background: #222222; transform: translateY(-2px); box-shadow: 0 8px 24px -6px rgba(0, 0, 0, 0.2); }

        @media (min-width: 768px) {
            .sidebar { transform: translateX(0) !important; }
            .sidebar-overlay { display: none !important; }
            .main-content { margin-right: 280px; padding: 1.5rem 2rem; }
            .mobile-header { display: none !important; }
        }
        @media (max-width: 640px) {
            .main-content { padding: 0.75rem; }
            .sidebar { width: 260px; padding: 1rem; }
        }
        .sidebar::-webkit-scrollbar { width: 4px; }
        .sidebar::-webkit-scrollbar-track { background: transparent; }
        .sidebar::-webkit-scrollbar-thumb { background: #334155; border-radius: 2px; }
    </style>
</head>
<body>

    <div id="sidebarOverlay" class="sidebar-overlay"></div>

    <aside id="sidebar" class="sidebar">
        <div class="hidden md:block mb-8">
            <a href="index.html" class="flex items-center gap-2 text-xl font-extrabold text-white no-underline">
                <i class="fas fa-feather-alt text-[#555555]"></i>
                <span>مداد العلم</span>
                <span class="text-[10px] bg-[#1a1a1a] px-2 py-0.5 rounded-full text-white">OWNER</span>
            </a>
        </div>
        <div class="flex items-center justify-between mb-6 md:hidden">
            <a href="index.html" class="text-lg font-extrabold text-white no-underline">
                <i class="fas fa-feather-alt text-[#555555] ml-2"></i>مداد
            </a>
            <button id="closeSidebarBtn" class="text-gray-400 hover:text-white text-xl"><i class="fas fa-times"></i></button>
        </div>
        <nav class="space-y-0.5">
            <a href="owner-dashboard.html" class="sidebar-link"><i class="fas fa-chart-pie"></i> لوحة التحكم</a>
            <a href="owner-students.html" class="sidebar-link"><i class="fas fa-user-graduate"></i> الطلاب</a>
            <a href="owner-courses.html" class="sidebar-link active"><i class="fas fa-book-open"></i> الكورسات</a>
            <a href="owner-teachers.html" class="sidebar-link"><i class="fas fa-chalkboard-teacher"></i> المدرسون</a>
            <a href="owner-classes.html" class="sidebar-link"><i class="fas fa-calendar-check"></i> الحصص</a>
            <a href="owner-exams.html" class="sidebar-link"><i class="fas fa-pencil-alt"></i> الامتحانات</a>
            <a href="owner-assignments.html" class="sidebar-link"><i class="fas fa-tasks"></i> الواجبات</a>
            <a href="owner-finance.html" class="sidebar-link"><i class="fas fa-coins"></i> المالية</a>
            <a href="owner-settings.html" class="sidebar-link"><i class="fas fa-cog"></i> الإعدادات</a>
            <a href="owner-profile.html" class="sidebar-link"><i class="fas fa-user"></i> الملف الشخصي</a>
            <button id="logoutBtn" class="sidebar-link text-red-400 hover:bg-red-900/30 hover:text-red-300 w-full text-right mt-4">
                <i class="fas fa-sign-out-alt"></i> تسجيل الخروج
            </button>
        </nav>
    </aside>

    <main class="main-content">
        <div class="mobile-header">
            <button class="menu-btn" id="openSidebarBtn"><i class="fas fa-bars"></i></button>
            <a href="index.html" class="text-lg font-extrabold text-[#0f172a]">
                <i class="fas fa-feather-alt text-[#000000] ml-1"></i>مداد العلم
            </a>
            <div class="w-8"></div>
        </div>

        <div class="hidden md:flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-[#000000]">إدارة الكورسات</h1>
            <button id="addCourseBtn" class="btn-primary flex items-center gap-2">
                <i class="fas fa-plus"></i> إضافة كورس
            </button>
        </div>

        <!-- عرض الكورسات كبطاقات -->
        <div class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-4" id="coursesContainer">
            <div class="col-span-full text-center text-gray-400 py-8">
                <i class="fas fa-spinner fa-spin ml-2"></i> جاري التحميل...
            </div>
        </div>
    </main>

    <!-- ======== مودال إضافة كورس ======== -->
    <div id="courseModal" class="modal-overlay">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-4">
                <h2 id="modalTitle" class="text-lg font-bold">إضافة كورس جديد</h2>
                <button id="closeModalBtn" class="text-gray-500 hover:text-gray-700 text-xl"><i class="fas fa-times"></i></button>
            </div>
            <form id="courseForm">
                <input type="hidden" id="courseId" />
                <div class="form-group">
                    <label for="courseTitle">عنوان الكورس</label>
                    <input type="text" id="courseTitle" class="form-control" placeholder="مقدمة في البرمجة" required />
                </div>
                <div class="form-group">
                    <label for="courseDescription">الوصف</label>
                    <textarea id="courseDescription" rows="3" class="form-control" placeholder="وصف الكورس..."></textarea>
                </div>
                <div class="form-group">
                    <label for="courseTeacher">المدرس المسؤول</label>
                    <input type="text" id="courseTeacher" class="form-control" placeholder="أحمد محمد" />
                </div>
                <div class="form-group">
                    <label for="courseDuration">المدة (ساعات)</label>
                    <input type="number" id="courseDuration" class="form-control" placeholder="10" />
                </div>
                <div class="form-group">
                    <label for="courseStatus">الحالة</label>
                    <select id="courseStatus" class="form-control">
                        <option value="active">نشط</option>
                        <option value="draft">مسودة</option>
                    </select>
                </div>
                <button type="submit" class="btn-primary w-full">حفظ</button>
            </form>
        </div>
    </div>

    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, onAuthStateChanged, signOut } from "firebase/auth";
        import {
            getFirestore,
            collection,
            query,
            where,
            orderBy,
            onSnapshot,
            addDoc,
            updateDoc,
            deleteDoc,
            doc,
            getDoc,
            serverTimestamp,
            setDoc,
        } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyBsSP8Le5_nDG2YFiyGcZ6BFR7aLi3djLU",
            authDomain: "edu-core-ddb48.firebaseapp.com",
            projectId: "edu-core-ddb48",
            storageBucket: "edu-core-ddb48.firebasestorage.app",
            messagingSenderId: "4743644287",
            appId: "1:4743644287:web:9167749cc80417b6876b4a",
            measurementId: "G-S94FBCFCXW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const container = document.getElementById('coursesContainer');
        const modal = document.getElementById('courseModal');
        const closeBtn = document.getElementById('closeModalBtn');
        const addBtn = document.getElementById('addCourseBtn');
        const form = document.getElementById('courseForm');
        const courseId = document.getElementById('courseId');
        const titleInput = document.getElementById('courseTitle');
        const descInput = document.getElementById('courseDescription');
        const teacherInput = document.getElementById('courseTeacher');
        const durationInput = document.getElementById('courseDuration');
        const statusInput = document.getElementById('courseStatus');

        let academyId = null;
        let unsubscribe = null;

        function showToast(message, type = "error") {
            Toastify({ text: message, duration: 4000, gravity: "top", position: "center", style: { background: type ===
                        "success" ? "#22C55E" : "#EF4444", borderRadius: "12px", padding: "12px 24px",
                    boxShadow: "0 8px 24px rgba(0,0,0,0.15)" }, stopOnFocus: true }).showToast();
        }

        function getStatusBadge(status) {
            if (status === 'active') return `<span class="badge badge-active">نشط</span>`;
            return `<span class="badge badge-draft">مسودة</span>`;
        }

        async function ensureCourseSubcollections(courseId) {
            // إنشاء المجموعات الفرعية تلقائياً
            const subcollections = ['lessons', 'students', 'materials', 'assignments'];
            for (const sub of subcollections) {
                const ref = doc(db, "academies", academyId, "courses", courseId, sub, "_placeholder");
                await setDoc(ref, { placeholder: true, createdAt: serverTimestamp() });
            }
            console.log('✅ تم إنشاء المجموعات الفرعية للكورس:', courseId);
        }

        function loadCourses() {
            if (unsubscribe) unsubscribe();
            if (!academyId) return;

            const q = query(
                collection(db, "academies", academyId, "courses"),
                orderBy("createdAt", "desc")
            );

            unsubscribe = onSnapshot(q, async (snapshot) => {
                if (snapshot.empty) {
                    container.innerHTML =
                        `<div class="col-span-full text-center text-gray-400 py-8">لا توجد كورسات</div>`;
                    return;
                }
                let html = '';
                for (const doc of snapshot.docs) {
                    const data = doc.data();
                    const id = doc.id;
                    // تأكد من وجود المجموعات الفرعية لكل كورس
                    await ensureCourseSubcollections(id);

                    html += `
                        <div class="course-card">
                            <div class="flex items-start justify-between">
                                <h4 class="font-bold text-[#000000] text-sm md:text-base">${data.title || 'بدون عنوان'}</h4>
                                ${getStatusBadge(data.status || 'draft')}
                            </div>
                            <p class="text-xs text-[#555555] mt-1 truncate">${data.description || 'لا يوجد وصف'}</p>
                            <div class="flex items-center justify-between mt-2 text-xs text-[#555555]">
                                <span><i class="fas fa-user ml-1"></i> ${data.teacher || 'غير محدد'}</span>
                                <span><i class="fas fa-clock ml-1"></i> ${data.duration || '0'} ساعة</span>
                            </div>
                            <div class="flex gap-2 mt-3">
                                <button onclick="editCourse('${id}')" class="btn-sm btn-edit"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteCourse('${id}')" class="btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                                <a href="owner-course-details.html?id=${id}" class="btn-sm bg-gray-200 text-gray-700 hover:bg-gray-300 transition rounded-lg px-2 py-1 text-xs">إدارة</a>
                            </div>
                        </div>
                    `;
                }
                container.innerHTML = html;
            }, (error) => {
                console.error("خطأ:", error);
                container.innerHTML =
                    `<div class="col-span-full text-center text-red-500 py-4">فشل التحميل</div>`;
            });
        }

        // إضافة/تعديل كورس
        form.addEventListener('submit', async (e) => {
            e.preventDefault();
            const id = courseId.value;
            const data = {
                title: titleInput.value.trim(),
                description: descInput.value.trim(),
                teacher: teacherInput.value.trim(),
                duration: durationInput.value || '0',
                status: statusInput.value,
                updatedAt: serverTimestamp(),
            };

            try {
                let courseRef;
                if (id) {
                    await updateDoc(doc(db, "academies", academyId, "courses", id), data);
                    showToast('تم تحديث الكورس بنجاح', 'success');
                } else {
                    data.createdAt = serverTimestamp();
                    data.studentCount = 0;
                    const docRef = await addDoc(collection(db, "academies", academyId, "courses"), data);
                    // إنشاء المجموعات الفرعية تلقائياً للكورس الجديد
                    await ensureCourseSubcollections(docRef.id);
                    showToast('تم إضافة الكورس بنجاح مع المجموعات الفرعية', 'success');
                }
                modal.classList.remove('show');
                form.reset();
            } catch (error) {
                showToast('فشل حفظ الكورس: ' + error.message);
            }
        });

        // تعديل
        window.editCourse = async (id) => {
            const docSnap = await getDoc(doc(db, "academies", academyId, "courses", id));
            if (docSnap.exists()) {
                const data = docSnap.data();
                courseId.value = id;
                titleInput.value = data.title || '';
                descInput.value = data.description || '';
                teacherInput.value = data.teacher || '';
                durationInput.value = data.duration || '';
                statusInput.value = data.status || 'draft';
                document.getElementById('modalTitle').textContent = 'تعديل الكورس';
                modal.classList.add('show');
            }
        };

        // حذف
        window.deleteCourse = async (id) => {
            const result = await Swal.fire({
                title: 'هل أنت متأكد؟',
                text: 'سيتم حذف الكورس وجميع محتوياته!',
                icon: 'warning',
                showCancelButton: true,
                confirmButtonColor: '#EF4444',
                confirmButtonText: 'نعم، احذف',
                cancelButtonText: 'إلغاء',
            });
            if (result.isConfirmed) {
                try {
                    await deleteDoc(doc(db, "academies", academyId, "courses", id));
                    showToast('تم حذف الكورس بنجاح', 'success');
                } catch (error) {
                    showToast('فشل حذف الكورس: ' + error.message);
                }
            }
        };

        // مودال
        addBtn.addEventListener('click', () => {
            courseId.value = '';
            form.reset();
            statusInput.value = 'active';
            document.getElementById('modalTitle').textContent = 'إضافة كورس جديد';
            modal.classList.add('show');
        });
        closeBtn.addEventListener('click', () => modal.classList.remove('show'));
        modal.addEventListener('click', (e) => { if (e.target === modal) modal.classList.remove('show'); });

        // Auth
        onAuthStateChanged(auth, async (user) => {
            if (!user) { window.location.href = "login.html"; return; }
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                if (data.role !== 'owner') {
                    showToast('ليس لديك صلاحية', 'error');
                    setTimeout(() => window.location.href = "dashboard.html", 1500);
                    return;
                }
                academyId = data.academyId || user.uid;
                loadCourses();
            }
        });

        // Logout & Sidebar (نفس الكود السابق)
        document.getElementById('logoutBtn').addEventListener('click', async () => {
            try { await signOut(auth);
                window.location.href = "login.html"; } catch (error) { showToast("فشل تسجيل الخروج: " + error.message,
                    "error"); }
        });

        const sidebar = document.getElementById('sidebar');
        const overlay = document.getElementById('sidebarOverlay');
        const openBtn = document.getElementById('openSidebarBtn');
        const closeBtn = document.getElementById('closeSidebarBtn');

        function openSidebar() { sidebar.classList.add('open');
            overlay.classList.add('show');
            document.body.style.overflow = 'hidden'; }

        function closeSidebar() { sidebar.classList.remove('open');
            overlay.classList.remove('show');
            document.body.style.overflow = ''; }

        if (openBtn) openBtn.addEventListener('click', openSidebar);
        if (closeBtn) closeBtn.addEventListener('click', closeSidebar);
        if (overlay) overlay.addEventListener('click', closeSidebar);
        document.querySelectorAll('#sidebar a').forEach(link => link.addEventListener('click', closeSidebar));
        window.addEventListener('resize', () => { if (window.innerWidth >= 768) closeSidebar(); });

        const lenis = new Lenis({ duration: 1.2 });
        function raf(time) { lenis.raf(time);
            requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        console.log('✅ مداد العلم — صفحة الكورسات جاهزة مع إنشاء مجموعات تلقائي');
    </script>
</body>
</html>
