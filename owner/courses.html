<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الكورسات – مداد العلم</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Cairo:wght@300..700&display=swap" rel="stylesheet" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- Lenis CSS -->
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.13/dist/lenis.css" />

    <!-- Toastify -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Main CSS -->
    <link rel="stylesheet" href="../assets/css/style.css" />

    <style>
        /* ===== تنسيقات خاصة بصفحة الكورسات ===== */
        body {
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Cairo', sans-serif;
        }

        /* ===== القائمة الجانبية ===== */
        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 280px;
            height: 100%;
            background: #0f172a;
            color: #94a3b8;
            padding: 1.5rem;
            overflow-y: auto;
            z-index: 40;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
            border-left: 1px solid #1e293b;
        }
        .sidebar.open {
            transform: translateX(0);
        }
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 39;
            display: none;
        }
        .sidebar-overlay.show {
            display: block;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.625rem 0.875rem;
            border-radius: 10px;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }
        .sidebar-link:hover {
            background: #1e293b;
            color: #ffffff;
        }
        .sidebar-link.active {
            background: #2563EB;
            color: #ffffff;
        }
        .sidebar-link i {
            width: 1.25rem;
            text-align: center;
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-content {
            margin-right: 0;
            padding: 1rem;
            min-height: 100vh;
            transition: margin-right 0.3s ease;
        }

        /* ===== رأس الهواتف ===== */
        .mobile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 0;
            margin-bottom: 1rem;
        }
        .menu-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #4b5563;
            cursor: pointer;
            padding: 0.25rem;
            transition: color 0.2s;
        }
        .menu-btn:hover {
            color: #000000;
        }

        /* ===== بطاقات الكورسات ===== */
        .course-card {
            background: #ffffff;
            border-radius: 16px;
            border: 1px solid #e5e5e5;
            overflow: hidden;
            transition: all 0.3s ease;
        }
        .course-card:hover {
            transform: translateY(-4px);
            box-shadow: 0 12px 30px -8px rgba(0, 0, 0, 0.08);
        }
        .course-card .card-image {
            height: 160px;
            background: linear-gradient(135deg, #e2e8f0 0%, #f1f5f9 100%);
            display: flex;
            align-items: center;
            justify-content: center;
            position: relative;
        }
        .course-card .card-image i {
            font-size: 3rem;
            color: #94a3b8;
        }
        .course-card .card-body {
            padding: 1.25rem;
        }
        .course-card .card-body h3 {
            font-size: 1rem;
            font-weight: 700;
            color: #000000;
            margin-bottom: 0.25rem;
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .course-card .card-body p {
            font-size: 0.85rem;
            color: #555555;
            display: -webkit-box;
            -webkit-line-clamp: 2;
            -webkit-box-orient: vertical;
            overflow: hidden;
        }
        .course-card .card-footer {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 1.25rem;
            border-top: 1px solid #f1f5f9;
            background: #fafbfc;
        }

        /* ===== شارات ===== */
        .badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .badge-active {
            background: #dcfce7;
            color: #166534;
        }
        .badge-inactive {
            background: #fee2e2;
            color: #991b1b;
        }
        .badge-pending {
            background: #fef3c7;
            color: #92400e;
        }
        .badge-draft {
            background: #f1f5f9;
            color: #475569;
        }

        /* ===== الأزرار ===== */
        .btn-sm {
            padding: 0.25rem 0.6rem;
            font-size: 0.7rem;
            min-height: 32px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-edit {
            background: #000000;
            color: #ffffff;
        }
        .btn-edit:hover {
            background: #222222;
        }
        .btn-danger {
            background: #EF4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-success {
            background: #22C55E;
            color: white;
        }
        .btn-success:hover {
            background: #16a34a;
        }

        .btn-primary {
            background: #000000;
            color: #ffffff;
            padding: 0.6rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 44px;
        }
        .btn-primary:hover {
            background: #222222;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px -6px rgba(0, 0, 0, 0.2);
        }

        /* ===== المودال ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 1.75rem;
            max-width: 520px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal-box .close-btn {
            background: none;
            border: none;
            font-size: 1.25rem;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s;
            padding: 0.25rem;
        }
        .modal-box .close-btn:hover {
            color: #1e293b;
        }

        /* ===== الحقول ===== */
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.3rem;
        }
        .form-control {
            width: 100%;
            padding: 0.55rem 0.875rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            background: #fafafa;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            color: #111827;
        }
        .form-control:focus {
            outline: none;
            border-color: #000000;
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }
        .form-control::placeholder {
            color: #94a3b8;
        }
        select.form-control {
            appearance: auto;
        }
        textarea.form-control {
            resize: vertical;
            min-height: 80px;
        }

        /* ===== الرسائل ===== */
        .message-box {
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }
        .message-box.error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .message-box.success {
            display: block;
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        /* ===== الحالة الفارغة ===== */
        .empty-state {
            text-align: center;
            padding: 3rem 1rem;
            color: #94a3b8;
        }
        .empty-state i {
            font-size: 3rem;
            opacity: 0.3;
            display: block;
            margin-bottom: 0.75rem;
        }
        .empty-state p {
            font-size: 0.9rem;
        }
        .empty-state .sub {
            font-size: 0.8rem;
            color: #cbd5e1;
        }

        /* ===== استجابة الهواتف ===== */
        @media (max-width: 640px) {
            .main-content {
                padding: 0.75rem;
            }
            .sidebar {
                width: 260px;
                padding: 1rem;
            }
            .modal-box {
                padding: 1.25rem;
                margin: 0.5rem;
                border-radius: 16px;
            }
            .btn-primary {
                font-size: 0.8rem;
                min-height: 40px;
                padding: 0.5rem 1rem;
            }
            .form-control {
                font-size: 0.85rem;
                padding: 0.45rem 0.75rem;
            }
            .course-card .card-image {
                height: 120px;
            }
            .course-card .card-body {
                padding: 0.75rem;
            }
            .course-card .card-footer {
                padding: 0.5rem 0.75rem;
                flex-wrap: wrap;
                gap: 0.5rem;
            }
        }

        @media (max-width: 360px) {
            .sidebar {
                width: 240px;
                padding: 0.75rem;
            }
            .sidebar-link {
                font-size: 0.75rem;
                padding: 0.5rem 0.75rem;
            }
            .modal-box {
                padding: 1rem;
            }
            .btn-primary {
                font-size: 0.75rem;
                min-height: 36px;
                padding: 0.4rem 0.75rem;
            }
        }

        /* ===== استجابة سطح المكتب ===== */
        @media (min-width: 768px) {
            .sidebar {
                transform: translateX(0) !important;
            }
            .sidebar-overlay {
                display: none !important;
            }
            .main-content {
                margin-right: 280px;
                padding: 1.5rem 2rem;
            }
            .mobile-header {
                display: none !important;
            }
        }

        /* ===== شريط التمرير ===== */
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 2px;
        }

        /* ===== صورة المستخدم ===== */
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #e5e5e5;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <!-- ======== مودال إضافة/تعديل كورس ======== -->
    <div id="courseModal" class="modal-overlay">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-4">
                <h2 id="modalTitle" class="text-lg font-bold text-[#000000]">إضافة كورس جديد</h2>

            <form id="courseForm">
                <input type="hidden" id="courseId" />

                    <input type="text" id="courseTitle" class="form-control" placeholder="مقدمة في البرمجة" required />

                    <label for="courseDescription">الوصف</label>
                    <textarea id="courseDescription" class="form-control" rows="3" placeholder="وصف الكورس..."></textarea>

                    <label for="courseTeacher">المدرس</label>

                    <label for="coursePrice">السعر</label>

                    <label for="courseStatus">الحالة</label>
                    <select id="courseStatus" class="form-control">

    <!-- ======== SCRIPTS ======== -->
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <!-- ===== Import Map ===== -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"
            }
        }
    </script>

    <script type="module">
        // ============================================================
        // owner/courses.js – إدارة الكورسات
        // ============================================================

        import { auth, db } from '../assets/js/firebase-config.js';
        import { onAuthStateChanged, signOut } from "firebase/auth";
        import {
            collection,
            doc,
            getDoc,
            getDocs,
            addDoc,
            updateDoc,
            deleteDoc,
            onSnapshot,
            query,
            where,
            orderBy,
            serverTimestamp,
            getCountFromServer,
        } from "firebase/firestore";

        // ============================================================
        // دوال مساعدة
        // ============================================================
        function showToast(message, type = "error") {
            Toastify({
                text: message,
                duration: 4000,
                gravity: "top",
                position: "center",
                style: {
                    background: type === "success" ? "#22C55E" : "#EF4444",
                    borderRadius: "12px",
                    padding: "12px 24px",
                    boxShadow: "0 8px 24px rgba(0,0,0,0.15)",
                },
                stopOnFocus: true,
            }).showToast();
        }

        function getStatusBadge(status) {
            const map = {
                active: "badge-active",
                draft: "badge-draft",
                archived: "badge-inactive",
            };
            const labels = {
                active: "نشط",
                draft: "مسودة",
                archived: "مؤرشف",
            };
            return `<span class="badge ${map[status] || "badge-draft"}">${labels[status] || status}</span>`;
        }

        // ============================================================
        // عناصر DOM
        // ============================================================
        const coursesContainer = document.getElementById("coursesContainer");
        const modal = document.getElementById("courseModal");
        const closeModalBtn = document.getElementById("closeModalBtn");
        const addCourseBtn = document.getElementById("addCourseBtn");
        const form = document.getElementById("courseForm");
        const courseIdInput = document.getElementById("courseId");
        const titleInput = document.getElementById("courseTitle");
        const descriptionInput = document.getElementById("courseDescription");
        const teacherInput = document.getElementById("courseTeacher");
        const priceInput = document.getElementById("coursePrice");
        const durationInput = document.getElementById("courseDuration");
        const statusInput = document.getElementById("courseStatus");
        const messageEl = document.getElementById("modalMessage");
        const refreshBtnMobile = document.getElementById("refreshBtnMobile");

        let academyId = null;
        let currentUser = null;
        let unsubscribeCourses = null;

        // ============================================================
        // عرض رسائل في المودال
        // ============================================================
        function showModalMessage(text, type = "error") {
            messageEl.textContent = text;
            messageEl.className = `message-box ${type}`;
            clearTimeout(messageEl._timeout);
            messageEl._timeout = setTimeout(() => {
                messageEl.className = "message-box";
                messageEl.textContent = "";
            }, 5000);
        }

        // ============================================================
        // تحميل الكورسات
        // ============================================================
        function loadCourses() {
            if (!academyId) return;

            if (unsubscribeCourses) {
                unsubscribeCourses();
                unsubscribeCourses = null;
            }

            const coursesRef = collection(db, "courses");
            const q = query(
                coursesRef,
                where("academyId", "==", academyId),
                orderBy("createdAt", "desc")
            );

            unsubscribeCourses = onSnapshot(q, (snapshot) => {
                if (snapshot.empty) {
                    coursesContainer.innerHTML = `
                        <div class="col-span-full empty-state">
                            <i class="fas fa-book-open"></i>
                            <p>لا توجد كورسات</p>
                            <p class="sub">اضغط على "إضافة كورس" لإضافة أول كورس</p>
                        </div>
                    `;
                    return;
                }

                let html = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    const studentCount = data.studentCount || 0;

                    html += `
                        <div class="course-card">
                            <div class="card-image">
                                <i class="fas fa-book-open"></i>
                                <div class="absolute top-3 left-3">
                                    ${getStatusBadge(data.status || "draft")}
                                </div>
                            </div>
                            <div class="card-body">
                                <h3>${data.title || "بدون عنوان"}</h3>
                                <p>${data.description || "لا يوجد وصف"}</p>
                            </div>
                            <div class="card-footer">
                                <div class="flex items-center gap-3 text-sm text-[#555555]">
                                    <span><i class="fas fa-user-graduate ml-1"></i> ${studentCount}</span>
                                    <span><i class="fas fa-clock ml-1"></i> ${data.duration || "-"}</span>
                                    <span><i class="fas fa-chalkboard-teacher ml-1"></i> ${data.teacher || "-"}</span>
                                </div>
                                <div class="flex items-center gap-1">
                                    <span class="text-sm font-bold text-[#000000]">${data.price ? '$' + data.price : 'مجاني'}</span>
                                    <button onclick="editCourse('${doc.id}')" class="btn-sm btn-edit" title="تعديل">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button onclick="deleteCourse('${doc.id}')" class="btn-sm btn-danger" title="حذف">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </div>
                            </div>
                        </div>
                    `;
                });
                coursesContainer.innerHTML = html;
            });
        }

        // ============================================================
        // إضافة/تعديل كورس
        // ============================================================
        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const id = courseIdInput.value;
            const data = {
                title: titleInput.value.trim(),
                description: descriptionInput.value.trim(),
                teacher: teacherInput.value.trim(),
                price: parseFloat(priceInput.value) || 0,
                duration: durationInput.value.trim() || "غير محدد",
                status: statusInput.value,
                academyId: academyId,
                updatedAt: serverTimestamp(),
            };

            if (!data.title) {
                showModalMessage("عنوان الكورس مطلوب", "error");
                return;
            }

            try {
                if (id) {
                    await updateDoc(doc(db, "courses", id), data);
                    showToast("تم تحديث الكورس بنجاح", "success");
                } else {
                    data.createdAt = serverTimestamp();
                    data.studentCount = 0;
                    await addDoc(collection(db, "courses"), data);
                    showToast("تم إضافة الكورس بنجاح", "success");
                }
                closeModal();
            } catch (error) {
                showModalMessage("فشل حفظ الكورس: " + error.message, "error");
            }
        });

        // ============================================================
        // تعديل كورس
        // ============================================================
        window.editCourse = async (id) => {
            try {
                const docSnap = await getDoc(doc(db, "courses", id));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    courseIdInput.value = id;
                    titleInput.value = data.title || "";
                    descriptionInput.value = data.description || "";
                    teacherInput.value = data.teacher || "";
                    priceInput.value = data.price || "";
                    durationInput.value = data.duration || "";
                    statusInput.value = data.status || "draft";
                    document.getElementById("modalTitle").textContent = "تعديل الكورس";
                    modal.classList.add("show");
                    messageEl.className = "message-box";
                    messageEl.textContent = "";
                }
            } catch (error) {
                showToast("فشل تحميل بيانات الكورس", "error");
            }
        };

        // ============================================================
        // حذف كورس
        // ============================================================
        window.deleteCourse = async (id) => {
            const result = await Swal.fire({
                title: "هل أنت متأكد؟",
                text: "سيتم حذف الكورس وجميع بياناته!",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#EF4444",
                cancelButtonColor: "#94a3b8",
                confirmButtonText: "نعم، احذف",
                cancelButtonText: "إلغاء",
            });

            if (result.isConfirmed) {
                try {
                    await deleteDoc(doc(db, "courses", id));
                    showToast("تم حذف الكورس بنجاح", "success");
                } catch (error) {
                    showToast("فشل حذف الكورس: " + error.message, "error");
                }
            }
        };

        // ============================================================
        // التحكم بالمودال
        // ============================================================
        function openModal() {
            courseIdInput.value = "";
            form.reset();
            statusInput.value = "draft";
            document.getElementById("modalTitle").textContent = "إضافة كورس جديد";
            messageEl.className = "message-box";
            messageEl.textContent = "";
            modal.classList.add("show");
        }

        function closeModal() {
            modal.classList.remove("show");
        }

        addCourseBtn.addEventListener("click", openModal);
        closeModalBtn.addEventListener("click", closeModal);

        modal.addEventListener("click", (e) => {
            if (e.target === modal) closeModal();
        });

        // ============================================================
        // تحديث البيانات
        // ============================================================
        async function refreshData() {
            loadCourses();
            showToast("تم تحديث البيانات", "success");
        }

        if (refreshBtnMobile) {
            refreshBtnMobile.addEventListener("click", refreshData);
        }

        // ============================================================
        // مراقبة حالة المصادقة
        // ============================================================
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "../login.html";
                return;
            }
            currentUser = user;

            try {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    if (data.role !== "owner") {
                        showToast("ليس لديك صلاحية الوصول لهذه الصفحة", "error");
                        setTimeout(() => {
                            window.location.href = "../dashboard.html";
                        }, 1500);
                        return;
                    }
                    academyId = data.academyId || user.uid;
                    loadCourses();
                } else {
                    window.location.href = "../register.html";
                }
            } catch (error) {
                console.error("خطأ في تحميل بيانات المستخدم:", error);
                showToast("فشل تحميل بيانات المستخدم", "error");
            }
        });

        // ============================================================
        // تسجيل الخروج
        // ============================================================
        document.getElementById("logoutBtn")?.addEventListener("click", async () => {
            try {
                await signOut(auth);
                window.location.href = "../login.html";
            } catch (error) {
                showToast("فشل تسجيل الخروج: " + error.message, "error");
            }
        });

        // ============================================================
        // القائمة الجانبية
        // ============================================================
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebarOverlay");
        const openBtn = document.getElementById("openSidebarBtn");
        const closeBtn = document.getElementById("closeSidebarBtn");

        function openSidebar() {
            sidebar.classList.add("open");
            overlay.classList.add("show");
            document.body.style.overflow = "hidden";
        }

        function closeSidebar() {
            sidebar.classList.remove("open");
            overlay.classList.remove("show");
            document.body.style.overflow = "";
        }

        if (openBtn) openBtn.addEventListener("click", openSidebar);
        if (closeBtn) closeBtn.addEventListener("click", closeSidebar);
        if (overlay) overlay.addEventListener("click", closeSidebar);
        document.querySelectorAll("#sidebar a").forEach((link) => {
            link.addEventListener("click", closeSidebar);
        });

        window.addEventListener("resize", () => {
            if (window.innerWidth >= 768) closeSidebar();
        });

        // ============================================================
        // Lenis Smooth Scroll
        // ============================================================
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            orientation: "vertical",
            gestureOrientation: "vertical",
            smoothWheel: true,
            wheelMultiplier: 1,
            touchMultiplier: 2,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        console.log("✅ مداد العلم — صفحة الكورسات (Owner) جاهزة");
    </script>

</body>
</html>
