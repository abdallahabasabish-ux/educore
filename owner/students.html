<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الطلاب – مداد العلم</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Cairo:wght@300..700&display=swap" rel="stylesheet" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- Lenis CSS -->
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.13/dist/lenis.css" />

    <!-- Toastify -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Main CSS -->
    <link rel="stylesheet" href="../assets/css/style.css" />

    <style>
        /* ===== تنسيقات خاصة بصفحة الطلاب ===== */
        body {
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Cairo', sans-serif;
        }

        /* ===== القائمة الجانبية ===== */
        .sidebar {
            position: fixed;
            top: 0;
            right: 0;
            width: 280px;
            height: 100%;
            background: #0f172a;
            color: #94a3b8;
            padding: 1.5rem;
            overflow-y: auto;
            z-index: 40;
            transition: transform 0.3s cubic-bezier(0.4, 0, 0.2, 1);
            transform: translateX(100%);
            border-left: 1px solid #1e293b;
        }
        .sidebar.open {
            transform: translateX(0);
        }
        .sidebar-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);
            z-index: 39;
            display: none;
        }
        .sidebar-overlay.show {
            display: block;
        }

        .sidebar-link {
            display: flex;
            align-items: center;
            gap: 0.75rem;
            padding: 0.625rem 0.875rem;
            border-radius: 10px;
            color: #94a3b8;
            text-decoration: none;
            transition: all 0.2s ease;
            font-size: 0.85rem;
        }
        .sidebar-link:hover {
            background: #1e293b;
            color: #ffffff;
        }
        .sidebar-link.active {
            background: #2563EB;
            color: #ffffff;
        }
        .sidebar-link i {
            width: 1.25rem;
            text-align: center;
        }

        /* ===== المحتوى الرئيسي ===== */
        .main-content {
            margin-right: 0;
            padding: 1rem;
            min-height: 100vh;
            transition: margin-right 0.3s ease;
        }

        /* ===== رأس الهواتف ===== */
        .mobile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 0;
            margin-bottom: 1rem;
        }
        .menu-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #4b5563;
            cursor: pointer;
            padding: 0.25rem;
            transition: color 0.2s;
        }
        .menu-btn:hover {
            color: #000000;
        }

        /* ===== الجدول ===== */
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 16px;
        }
        .table-wrap table {
            min-width: 700px;
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
            background: white;
            border-radius: 16px;
            overflow: hidden;
        }
        .table-wrap th {
            text-align: right;
            padding: 0.75rem 1rem;
            background: #f8fafc;
            color: #64748b;
            font-weight: 600;
            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;
            border-bottom: 1px solid #e5e5e5;
            white-space: nowrap;
        }
        .table-wrap td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        .table-wrap tr:last-child td {
            border-bottom: none;
        }
        .table-wrap tr:hover td {
            background: #fafbfc;
        }

        /* ===== شارات ===== */
        .badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .badge-active {
            background: #dcfce7;
            color: #166534;
        }
        .badge-inactive {
            background: #fee2e2;
            color: #991b1b;
        }
        .badge-pending {
            background: #fef3c7;
            color: #92400e;
        }

        /* ===== المجموعات ===== */
        .group-badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 500;
            background: #e5e5e5;
            color: #333333;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
        .group-badge:hover {
            background: #d5d5d5;
        }
        .group-badge.active {
            border-color: #000000;
            background: #f0f0f0;
        }

        /* ===== الأزرار ===== */
        .btn-sm {
            padding: 0.25rem 0.6rem;
            font-size: 0.7rem;
            min-height: 32px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            transition: all 0.2s ease;
        }
        .btn-edit {
            background: #000000;
            color: #ffffff;
        }
        .btn-edit:hover {
            background: #222222;
        }
        .btn-danger {
            background: #EF4444;
            color: white;
        }
        .btn-danger:hover {
            background: #dc2626;
        }
        .btn-success {
            background: #22C55E;
            color: white;
        }
        .btn-success:hover {
            background: #16a34a;
        }

        .btn-primary {
            background: #000000;
            color: #ffffff;
            padding: 0.6rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 44px;
        }
        .btn-primary:hover {
            background: #222222;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px -6px rgba(0, 0, 0, 0.2);
        }
        .btn-secondary {
            background: transparent;
            color: #1e293b;
            padding: 0.6rem 1.5rem;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1.5px solid #e5e7eb;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 44px;
        }
        .btn-secondary:hover {
            background: #f8fafc;
            border-color: #94a3b8;
        }

        /* ===== المودال ===== */
        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.show {
            display: flex;
        }
        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 1.75rem;
            max-width: 520px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            animation: modalIn 0.3s ease;
        }
        @keyframes modalIn {
            from {
                opacity: 0;
                transform: scale(0.95) translateY(20px);
            }
            to {
                opacity: 1;
                transform: scale(1) translateY(0);
            }
        }
        .modal-box .close-btn {
            background: none;
            border: none;
            font-size: 1.25rem;
            color: #94a3b8;
            cursor: pointer;
            transition: color 0.2s;
            padding: 0.25rem;
        }
        .modal-box .close-btn:hover {
            color: #1e293b;
        }

        /* ===== الحقول ===== */
        .form-group {
            margin-bottom: 1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.3rem;
        }
        .form-control {
            width: 100%;
            padding: 0.55rem 0.875rem;
            border: 1.5px solid #e5e7eb;
            border-radius: 10px;
            background: #fafafa;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            color: #111827;
        }
        .form-control:focus {
            outline: none;
            border-color: #000000;
            background: white;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }
        .form-control::placeholder {
            color: #94a3b8;
        }
        select.form-control {
            appearance: auto;
        }

        /* ===== الرسائل ===== */
        .message-box {
            padding: 0.5rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }
        .message-box.error {
            display: block;
            background: #fee2e2;
            color: #991b1b;
            border: 1px solid #fecaca;
        }
        .message-box.success {
            display: block;
            background: #dcfce7;
            color: #166534;
            border: 1px solid #bbf7d0;
        }

        /* ===== استجابة الهواتف ===== */
        @media (max-width: 640px) {
            .main-content {
                padding: 0.75rem;
            }
            .sidebar {
                width: 260px;
                padding: 1rem;
            }
            .table-wrap table {
                min-width: 600px;
                font-size: 0.75rem;
            }
            .table-wrap th,
            .table-wrap td {
                padding: 0.5rem 0.75rem;
            }
            .modal-box {
                padding: 1.25rem;
                margin: 0.5rem;
                border-radius: 16px;
            }
            .btn-primary {
                font-size: 0.8rem;
                min-height: 40px;
                padding: 0.5rem 1rem;
            }
            .form-control {
                font-size: 0.85rem;
                padding: 0.45rem 0.75rem;
            }
        }

        @media (max-width: 360px) {
            .sidebar {
                width: 240px;
                padding: 0.75rem;
            }
            .sidebar-link {
                font-size: 0.75rem;
                padding: 0.5rem 0.75rem;
            }
            .table-wrap table {
                min-width: 480px;
                font-size: 0.65rem;
            }
            .table-wrap th,
            .table-wrap td {
                padding: 0.35rem 0.5rem;
            }
            .modal-box {
                padding: 1rem;
            }
            .btn-primary {
                font-size: 0.75rem;
                min-height: 36px;
                padding: 0.4rem 0.75rem;
            }
        }

        /* ===== استجابة سطح المكتب ===== */
        @media (min-width: 768px) {
            .sidebar {
                transform: translateX(0) !important;
            }
            .sidebar-overlay {
                display: none !important;
            }
            .main-content {
                margin-right: 280px;
                padding: 1.5rem 2rem;
            }
            .mobile-header {
                display: none !important;
            }
        }

        /* ===== شريط التمرير ===== */
        .sidebar::-webkit-scrollbar {
            width: 4px;
        }
        .sidebar::-webkit-scrollbar-track {
            background: transparent;
        }
        .sidebar::-webkit-scrollbar-thumb {
            background: #334155;
            border-radius: 2px;
        }

        /* ===== صورة المستخدم ===== */
        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            border: 2px solid #e5e5e5;
            object-fit: cover;
        }
    </style>
</head>
<body>

    <!-- ======== طبقة خلفية القائمة ======== -->

    <!-- ======== القائمة الجانبية ======== -->

    <!-- ===== Import Map ===== -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",

    <script type="module">
        // ============================================================
        // owner/students.js – إدارة الطلاب والمجموعات (نسخة مُصلحة)
        // ============================================================

        // ===== استيراد Firebase =====
        // تأكد من أن المسار صحيح: ../assets/js/firebase-config.js
        import { auth, db } from '../assets/js/firebase-config.js';
        import { onAuthStateChanged, signOut } from "firebase/auth";
        import {
            collection,
            doc,
            getDoc,
            getDocs,
            addDoc,
            updateDoc,
            deleteDoc,
            onSnapshot,
            query,
            where,
            orderBy,
            serverTimestamp,
            getCountFromServer,
        } from "firebase/firestore";

        // ============================================================
        // دوال مساعدة
        // ============================================================
        function showToast(message, type = "error") {
            Toastify({
                text: message,
                duration: 4000,
                gravity: "top",
                position: "center",
                style: {
                    background: type === "success" ? "#22C55E" : "#EF4444",
                    borderRadius: "12px",
                    padding: "12px 24px",
                    boxShadow: "0 8px 24px rgba(0,0,0,0.15)",
                },
                stopOnFocus: true,
            }).showToast();
        }

        function getStatusBadge(status) {
            const map = {
                active: "badge-active",
                inactive: "badge-inactive",
                pending: "badge-pending",
            };
            const labels = {
                active: "نشط",
                inactive: "غير نشط",
                pending: "معلق",
            };
            return `<span class="badge ${map[status] || "badge-pending"}">${labels[status] || status}</span>`;
        }

        // ============================================================
        // عناصر DOM
        // ============================================================
        const tbody = document.getElementById("studentsTableBody");
        const groupsContainer = document.getElementById("groupsContainer");
        const modal = document.getElementById("studentModal");
        const groupModal = document.getElementById("groupModal");
        const closeModalBtn = document.getElementById("closeModalBtn");
        const closeGroupModalBtn = document.getElementById("closeGroupModalBtn");
        const addStudentBtn = document.getElementById("addStudentBtn");
        const addGroupBtn = document.getElementById("addGroupBtn");
        const form = document.getElementById("studentForm");
        const groupForm = document.getElementById("groupForm");
        const studentIdInput = document.getElementById("studentId");
        const nameInput = document.getElementById("studentName");
        const emailInput = document.getElementById("studentEmail");
        const phoneInput = document.getElementById("studentPhone");
        const groupSelect = document.getElementById("studentGroup");
        const statusInput = document.getElementById("studentStatus");
        const messageEl = document.getElementById("modalMessage");
        const groupMessageEl = document.getElementById("groupMessage");
        const groupNameInput = document.getElementById("groupName");
        const refreshBtnMobile = document.getElementById("refreshBtnMobile");

        let academyId = null;
        let currentUser = null;
        let unsubscribeStudents = null;
        let unsubscribeGroups = null;

        // ============================================================
        // عرض رسائل في المودال
        // ============================================================
        function showModalMessage(text, type = "error") {
            messageEl.textContent = text;
            messageEl.className = `message-box ${type}`;
            clearTimeout(messageEl._timeout);
            messageEl._timeout = setTimeout(() => {
                messageEl.className = "message-box";
                messageEl.textContent = "";
            }, 5000);
        }

        function showGroupMessage(text, type = "error") {
            groupMessageEl.textContent = text;
            groupMessageEl.className = `message-box ${type}`;
            clearTimeout(groupMessageEl._timeout);
            groupMessageEl._timeout = setTimeout(() => {
                groupMessageEl.className = "message-box";
                groupMessageEl.textContent = "";
            }, 5000);
        }

        // ============================================================
        // 1. تحميل المجموعات (مع معالجة الأخطاء)
        // ============================================================
        function loadGroups() {
            if (!academyId) {
                console.warn("⚠️ loadGroups: academyId غير معرف");
                return;
            }

            if (unsubscribeGroups) {
                unsubscribeGroups();
                unsubscribeGroups = null;
            }

            const groupsRef = collection(db, "academies", academyId, "groups");
            const q = query(groupsRef, orderBy("name", "asc"));

            try {
                unsubscribeGroups = onSnapshot(q, (snapshot) => {
                    let html = `<span class="group-badge active" data-group="all">جميع الطلاب</span>`;
                    let options = `<option value="all">جميع الطلاب</option>`;

                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        html += `<span class="group-badge" data-group="${doc.id}">${data.name}</span>`;
                        options += `<option value="${doc.id}">${data.name}</option>`;
                    });

                    groupsContainer.innerHTML = html;
                    groupSelect.innerHTML = options;

                    // إضافة حدث النقر على المجموعات
                    document.querySelectorAll(".group-badge").forEach((badge) => {
                        badge.addEventListener("click", function() {
                            document.querySelectorAll(".group-badge").forEach((b) => b.classList.remove("active"));
                            this.classList.add("active");
                            const groupId = this.dataset.group;
                            loadStudents(groupId);
                        });
                    });

                    console.log("✅ تم تحميل المجموعات بنجاح، العدد:", snapshot.size);
                }, (error) => {
                    console.error("❌ خطأ في تحميل المجموعات:", error);
                    groupsContainer.innerHTML = `<span class="text-red-500 text-sm">حدث خطأ في تحميل المجموعات</span>`;
                });
            } catch (error) {
                console.error("❌ استثناء في loadGroups:", error);
            }
        }

        // ============================================================
        // 2. تحميل الطلاب (مع معالجة الأخطاء)
        // ============================================================
        function loadStudents(groupId = "all") {
            if (!academyId) {
                console.warn("⚠️ loadStudents: academyId غير معرف");
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center text-gray-400 py-8">
                            <i class="fas fa-exclamation-circle text-2xl opacity-50 block mb-2"></i>
                            <p class="text-sm">لم يتم تحديد الأكاديمية</p>
                        </td>
                    </tr>
                `;
                return;
            }

            if (unsubscribeStudents) {
                unsubscribeStudents();
                unsubscribeStudents = null;
            }

            const studentsRef = collection(db, "academies", academyId, "students");
            let q;

            if (groupId === "all") {
                q = query(studentsRef, orderBy("createdAt", "desc"));
            } else {
                q = query(
                    studentsRef,
                    where("groupId", "==", groupId),
                    orderBy("createdAt", "desc")
                );
            }

            try {
                unsubscribeStudents = onSnapshot(q, (snapshot) => {
                    if (snapshot.empty) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="6" class="text-center text-gray-400 py-8">
                                    <i class="fas fa-user-graduate text-3xl opacity-30 block mb-2"></i>
                                    <p class="text-sm">لا يوجد طلاب</p>
                                    <p class="text-xs mt-1">اضغط على "إضافة طالب" لإضافة أول طالب</p>
                                </td>
                            </tr>
                        `;
                        console.log("📭 لا يوجد طلاب في هذه الأكاديمية");
                        return;
                    }

                    let html = "";
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const groupName = data.groupName || "-";

                        html += `
                            <tr>
                                <td class="font-medium">${data.fullName || "غير محدد"}</td>
                                <td>${data.email || "-"}</td>
                                <td class="hidden sm:table-cell">${data.phone || "-"}</td>
                                <td><span class="text-xs text-[#555555]">${groupName}</span></td>
                                <td>${getStatusBadge(data.status || "pending")}</td>
                                <td class="text-center whitespace-nowrap">
                                    <button onclick="editStudent('${doc.id}')" class="btn-sm btn-edit" title="تعديل">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button onclick="deleteStudent('${doc.id}')" class="btn-sm btn-danger" title="حذف">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                    tbody.innerHTML = html;
                    console.log("✅ تم تحميل الطلاب بنجاح، العدد:", snapshot.size);
                }, (error) => {
                    console.error("❌ خطأ في تحميل الطلاب:", error);
                    tbody.innerHTML = `
                        <tr>
                            <td colspan="6" class="text-center text-red-500 py-4">
                                <i class="fas fa-exclamation-circle text-2xl block mb-2"></i>
                                <p class="text-sm">حدث خطأ في تحميل البيانات</p>
                            </td>
                        </tr>
                    `;
                });
            } catch (error) {
                console.error("❌ استثناء في loadStudents:", error);
                tbody.innerHTML = `
                    <tr>
                        <td colspan="6" class="text-center text-red-500 py-4">
                            <i class="fas fa-exclamation-triangle text-2xl block mb-2"></i>
                            <p class="text-sm">حدث خطأ غير متوقع</p>
                        </tr>
                    `;
                }
            }
        }

        // ============================================================
        // 3. إضافة/تعديل طالب
        // ============================================================
        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const id = studentIdInput.value;
            const groupId = groupSelect.value;
            const groupName = groupSelect.options[groupSelect.selectedIndex]?.text || "";

            const data = {
                fullName: nameInput.value.trim(),
                email: emailInput.value.trim(),
                phone: phoneInput.value.trim(),
                groupId: groupId === "all" ? null : groupId,
                groupName: groupId === "all" ? null : groupName,
                status: statusInput.value,
                updatedAt: serverTimestamp(),
            };

            if (!data.fullName || !data.email) {
                showModalMessage("الاسم والبريد الإلكتروني مطلوبان", "error");
                return;
            }

            try {
                if (id) {
                    await updateDoc(doc(db, "academies", academyId, "students", id), data);
                    showToast("تم تحديث الطالب بنجاح", "success");
                } else {
                    // التحقق من عدم تكرار البريد الإلكتروني
                    const studentsRef = collection(db, "academies", academyId, "students");
                    const q = query(studentsRef, where("email", "==", data.email));
                    const snapshot = await getDocs(q);
                    if (!snapshot.empty) {
                        showModalMessage("البريد الإلكتروني مستخدم بالفعل", "error");
                        return;
                    }

                    data.createdAt = serverTimestamp();
                    await addDoc(collection(db, "academies", academyId, "students"), data);

                    // تحديث عدد الطلاب في الأكاديمية
                    const academyRef = doc(db, "academies", academyId);
                    const academySnap = await getDoc(academyRef);
                    if (academySnap.exists()) {
                        const currentCount = academySnap.data().studentCount || 0;
                        await updateDoc(academyRef, {
                            studentCount: currentCount + 1,
                            updatedAt: serverTimestamp(),
                        });
                    }

                    showToast("تم إضافة الطالب بنجاح", "success");
                }
                closeModal();
            } catch (error) {
                console.error("❌ خطأ في حفظ الطالب:", error);
                showModalMessage("فشل حفظ الطالب: " + error.message, "error");
            }
        });

        // ============================================================
        // 4. تعديل طالب
        // ============================================================
        window.editStudent = async (id) => {
            try {
                const docSnap = await getDoc(doc(db, "academies", academyId, "students", id));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    studentIdInput.value = id;
                    nameInput.value = data.fullName || "";
                    emailInput.value = data.email || "";
                    phoneInput.value = data.phone || "";
                    groupSelect.value = data.groupId || "all";
                    statusInput.value = data.status || "active";
                    document.getElementById("modalTitle").textContent = "تعديل الطالب";
                    modal.classList.add("show");
                    messageEl.className = "message-box";
                    messageEl.textContent = "";
                } else {
                    showToast("الطالب غير موجود", "error");
                }
            } catch (error) {
                console.error("❌ خطأ في تحميل بيانات الطالب:", error);
                showToast("فشل تحميل بيانات الطالب: " + error.message, "error");
            }
        };

        // ============================================================
        // 5. حذف طالب
        // ============================================================
        window.deleteStudent = async (id) => {
            const result = await Swal.fire({
                title: "هل أنت متأكد؟",
                text: "لن تتمكن من استعادة هذا الطالب!",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#EF4444",
                cancelButtonColor: "#94a3b8",
                confirmButtonText: "نعم، احذف",
                cancelButtonText: "إلغاء",
            });

            if (result.isConfirmed) {
                try {
                    await deleteDoc(doc(db, "academies", academyId, "students", id));

                    // تحديث عدد الطلاب
                    const academyRef = doc(db, "academies", academyId);
                    const academySnap = await getDoc(academyRef);
                    if (academySnap.exists()) {
                        const currentCount = academySnap.data().studentCount || 0;
                        await updateDoc(academyRef, {
                            studentCount: Math.max(0, currentCount - 1),
                            updatedAt: serverTimestamp(),
                        });
                    }

                    showToast("تم حذف الطالب بنجاح", "success");
                } catch (error) {
                    console.error("❌ خطأ في حذف الطالب:", error);
                    showToast("فشل حذف الطالب: " + error.message, "error");
                }
            }
        };

        // ============================================================
        // 6. إنشاء مجموعة جديدة
        // ============================================================
        groupForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = groupNameInput.value.trim();
            if (!name) {
                showGroupMessage("يرجى إدخال اسم المجموعة", "error");
                return;
            }

            try {
                await addDoc(collection(db, "academies", academyId, "groups"), {
                    name: name,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                });
                showToast("تم إنشاء المجموعة بنجاح", "success");
                groupNameInput.value = "";
                closeGroupModal();
            } catch (error) {
                console.error("❌ خطأ في إنشاء المجموعة:", error);
                showGroupMessage("فشل إنشاء المجموعة: " + error.message, "error");
            }
        });

        // ============================================================
        // 7. التحكم بالمودال
        // ============================================================
        function openModal() {
            studentIdInput.value = "";
            form.reset();
            statusInput.value = "active";
            document.getElementById("modalTitle").textContent = "إضافة طالب جديد";
            messageEl.className = "message-box";
            messageEl.textContent = "";
            modal.classList.add("show");
            console.log("✅ فتح مودال إضافة طالب");
        }

        function closeModal() {
            modal.classList.remove("show");
        }

        function openGroupModal() {
            groupNameInput.value = "";
            groupMessageEl.className = "message-box";
            groupMessageEl.textContent = "";
            groupModal.classList.add("show");
        }

        function closeGroupModal() {
            groupModal.classList.remove("show");
        }

        // ===== ربط الأحداث =====
        console.log("🔍 جارٍ ربط الأحداث...");

        if (addStudentBtn) {
            addStudentBtn.addEventListener("click", openModal);
            console.log("✅ تم ربط حدث زر إضافة طالب");
        } else {
            console.warn("⚠️ لم يتم العثور على زر addStudentBtn");
        }

        if (closeModalBtn) {
            closeModalBtn.addEventListener("click", closeModal);
            console.log("✅ تم ربط حدث زر إغلاق المودال");
        }

        if (addGroupBtn) {
            addGroupBtn.addEventListener("click", openGroupModal);
            console.log("✅ تم ربط حدث زر إضافة مجموعة");
        }

        if (closeGroupModalBtn) {
            closeGroupModalBtn.addEventListener("click", closeGroupModal);
            console.log("✅ تم ربط حدث زر إغلاق مودال المجموعة");
        }

        // إغلاق المودال عند النقر خارج المحتوى
        modal.addEventListener("click", (e) => {
            if (e.target === modal) closeModal();
        });
        groupModal.addEventListener("click", (e) => {
            if (e.target === groupModal) closeGroupModal();
        });

        // ============================================================
        // 8. تحديث البيانات
        // ============================================================
        async function refreshData() {
            loadGroups();
            loadStudents();
            showToast("تم تحديث البيانات", "success");
        }

        if (refreshBtnMobile) {
            refreshBtnMobile.addEventListener("click", refreshData);
        }

        // ============================================================
        // 9. مراقبة حالة المصادقة
        // ============================================================
        onAuthStateChanged(auth, async (user) => {
            console.log("🔄 onAuthStateChanged تم استدعاؤها، user:", user ? user.uid : "غير مسجل");

            if (!user) {
                window.location.href = "../login.html";
                return;
            }
            currentUser = user;
            console.log("✅ المستخدم مسجل:", user.uid);

            try {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    console.log("📄 بيانات المستخدم:", data);

                    // التحقق من الصلاحية
                    if (data.role !== "owner") {
                        showToast("ليس لديك صلاحية الوصول لهذه الصفحة", "error");
                        setTimeout(() => {
                            window.location.href = "../dashboard.html";
                        }, 1500);
                        return;
                    }

                    academyId = data.academyId || user.uid;
                    console.log("🏫 academyId:", academyId);

                    // تحميل البيانات
                    loadGroups();
                    loadStudents();

                } else {
                    console.warn("⚠️ لم يتم العثور على وثيقة المستخدم في Firestore");
                    window.location.href = "../register.html";
                }
            } catch (error) {
                console.error("❌ خطأ في تحميل بيانات المستخدم:", error);
                showToast("فشل تحميل بيانات المستخدم: " + error.message, "error");
            }
        });

        // ============================================================
        // 10. تسجيل الخروج
        // ============================================================
        document.getElementById("logoutBtn")?.addEventListener("click", async () => {
            try {
                await signOut(auth);
                window.location.href = "../login.html";
            } catch (error) {
                showToast("فشل تسجيل الخروج: " + error.message, "error");
            }
        });

        // ============================================================
        // 11. القائمة الجانبية
        // ============================================================
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebarOverlay");
        const openBtn = document.getElementById("openSidebarBtn");
        const closeBtn = document.getElementById("closeSidebarBtn");

        function openSidebar() {
            sidebar.classList.add("open");
            overlay.classList.add("show");
            document.body.style.overflow = "hidden";
        }

        function closeSidebar() {
            sidebar.classList.remove("open");
            overlay.classList.remove("show");
            document.body.style.overflow = "";
        }

        if (openBtn) openBtn.addEventListener("click", openSidebar);
        if (closeBtn) closeBtn.addEventListener("click", closeSidebar);
        if (overlay) overlay.addEventListener("click", closeSidebar);
        document.querySelectorAll("#sidebar a").forEach((link) => {
            link.addEventListener("click", closeSidebar);
        });

        window.addEventListener("resize", () => {
            if (window.innerWidth >= 768) closeSidebar();
        });

        // ============================================================
        // 12. Lenis Smooth Scroll
        // ============================================================
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            orientation: "vertical",
            gestureOrientation: "vertical",
            smoothWheel: true,
            wheelMultiplier: 1,
            touchMultiplier: 2,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        console.log("✅ مداد العلم — صفحة الطلاب (Owner) جاهزة مع تحسينات");
    </script>

</body>
</html>
