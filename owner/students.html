    <style>
        body {
            background: #f5f5f5;
            margin: 0;
            padding: 0;
            font-family: 'Inter', 'Cairo', sans-serif;
        }
        .sidebar {
            position: fixed;
            top: 0;

            background: #0f172a;

            transform: translateX(0);

            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.4);
            backdrop-filter: blur(4px);

            display: none;

        }

            transition: all 0.2s ease;
            font-size: 0.85rem;

            background: #1e293b;
            color: #ffffff;
        }
        .sidebar-link.active {
            background: #2563EB;
            color: #ffffff;
        }
        .sidebar-link i {
            width: 1.25rem;
            text-align: center;
        }
        .main-content {
            margin-right: 0;
            padding: 1rem;
            min-height: 100vh;
            transition: margin-right 0.3s ease;
        }
        .mobile-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            padding: 0.75rem 0;
            margin-bottom: 1rem;
        }
        .menu-btn {
            background: none;
            border: none;
            font-size: 1.5rem;
            color: #4b5563;
            cursor: pointer;
            padding: 0.25rem;
            transition: color 0.2s;
        }
        .menu-btn:hover {
            color: #000000;
        }
        .table-wrap {
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
            border-radius: 16px;
        }
        .table-wrap table {
            min-width: 700px;
            width: 100%;
            border-collapse: collapse;
            font-size: 0.875rem;
            background: white;
            border-radius: 16px;

        .table-wrap th {
            text-align: right;

            font-size: 0.7rem;
            text-transform: uppercase;
            letter-spacing: 0.5px;

        }
        .table-wrap td {
            padding: 0.75rem 1rem;
            border-bottom: 1px solid #f1f5f9;
            vertical-align: middle;
        }
        .badge {
            display: inline-block;
            padding: 0.15rem 0.6rem;
            border-radius: 9999px;
            font-size: 0.65rem;
            font-weight: 600;
        }
        .badge-active { background: #dcfce7; color: #166534; }
        .badge-inactive { background: #fee2e2; color: #991b1b; }
        .badge-pending { background: #fef3c7; color: #92400e; }
        .group-badge {
            display: inline-block;
            padding: 0.2rem 0.8rem;
            border-radius: 9999px;
            font-size: 0.7rem;
            font-weight: 500;
            background: #e5e5e5;
            color: #333333;
            cursor: pointer;
            transition: all 0.2s ease;
            border: 2px solid transparent;
        }
        .group-badge.active {
            border-color: #000000;
            background: #f0f0f0;
        }
        .btn-sm {
            padding: 0.25rem 0.6rem;
            font-size: 0.7rem;
            min-height: 32px;
            border-radius: 8px;
            border: none;
            cursor: pointer;
        }
        .btn-edit { background: #000000; color: #ffffff; }
        .btn-danger { background: #EF4444; color: white; }
        .btn-primary {
            background: #000000;
            color: #ffffff;
            padding: 0.6rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.9rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
        }
        .btn-secondary {
            background: transparent;
            color: #1e293b;
            padding: 0.6rem 1.5rem;
            border-radius: 10px;
            font-weight: 500;
            font-size: 0.9rem;
            border: 1.5px solid #e5e7eb;
            cursor: pointer;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;

        .modal-overlay {
            position: fixed;
            inset: 0;
            background: rgba(0, 0, 0, 0.5);
            backdrop-filter: blur(4px);
            z-index: 1000;
            display: none;
            align-items: center;
            justify-content: center;
            padding: 1rem;
        }
        .modal-overlay.show { display: flex; }
        .modal-box {
            background: white;
            border-radius: 20px;
            padding: 1.75rem;
            max-width: 520px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
        }
        .form-group { margin-bottom: 1rem; }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #1e293b;
            margin-bottom: 0.3rem;

        .form-control {

            background: #fafafa;

        .message-box {
            padding: 0.5rem 1rem;

            margin-top: 0.5rem;

        }
        .message-box.error { display: block; background: #fee2e2; color: #991b1b; }
        .message-box.success { display: block; background: #dcfce7; color: #166534; }
        
        @media (min-width: 768px) {
            .sidebar { transform: translateX(0) !important; }
            .sidebar-overlay { display: none !important; }
            .main-content { margin-right: 280px; padding: 1.5rem 2rem; }

    <!-- مكتبات JS الخارجية -->

    <!-- 1️⃣ السكربت الأول: معالجة الواجهة (مستقل تماماً لضمان عمل الأزرار والقائمة) -->
    <script>
        // إعداد التنبيهات
        window.showToast = function(message, type = "error") {
            Toastify({
                text: message,
                duration: 4000,
                gravity: "top",
                position: "center",
                style: {
                    background: type === "success" ? "#22C55E" : "#EF4444",
                    borderRadius: "12px",
                    padding: "12px 24px",
                }
            }).showToast();
        }

        // التحكم بالقائمة الجانبية
        const sidebar = document.getElementById("sidebar");
        const sidebarOverlay = document.getElementById("sidebarOverlay");
        
        document.getElementById("openSidebarBtn")?.addEventListener("click", () => {
            sidebar.classList.add("open");
            sidebarOverlay.classList.add("show");
        });
        
        document.getElementById("closeSidebarBtn")?.addEventListener("click", closeSidebar);
        sidebarOverlay?.addEventListener("click", closeSidebar);

        function closeSidebar() {
            sidebar.classList.remove("open");
            sidebarOverlay.classList.remove("show");
        }

        // التحكم بالنوافذ المنبثقة (Modals)
        const studentModal = document.getElementById("studentModal");
        const groupModal = document.getElementById("groupModal");

        document.getElementById("addStudentBtn")?.addEventListener("click", () => {
            document.getElementById("studentForm").reset();
            document.getElementById("studentId").value = "";
            document.getElementById("modalTitle").textContent = "إضافة طالب جديد";
            studentModal.classList.add("show");
        });

        document.getElementById("closeModalBtn")?.addEventListener("click", () => {
            studentModal.classList.remove("show");
        });

        document.getElementById("addGroupBtn")?.addEventListener("click", () => {
            document.getElementById("groupForm").reset();
            groupModal.classList.add("show");
        });

        document.getElementById("closeGroupModalBtn")?.addEventListener("click", () => {
            groupModal.classList.remove("show");
        });

        // إغلاق النوافذ عند النقر خارجها
        window.addEventListener("click", (e) => {
            if (e.target === studentModal) studentModal.classList.remove("show");
            if (e.target === groupModal) groupModal.classList.remove("show");
        });

        // تشغيل النزول السلس
        const lenis = new Lenis();
        function raf(time) { lenis.raf(time); requestAnimationFrame(raf); }
        requestAnimationFrame(raf);
    </script>

    <!-- إعدادات Firebase -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js"
            }
        }
    </script>

    <!-- 2️⃣ السكربت الثاني: معالجة بيانات Firebase -->
    <script type="module">
        import { auth, db } from '../assets/js/firebase-config.js';
        import { onAuthStateChanged, signOut } from "firebase/auth";
        import { collection, doc, getDoc, getDocs, addDoc, updateDoc, deleteDoc, onSnapshot, query, where, orderBy, serverTimestamp } from "firebase/firestore";

        // متغير عام لتخزين معرف الأكاديمية
        let academyId = null;

        // دالة لعرض حالة الطالب في الجدول
        function getStatusBadge(status) {
            const map = { active: "badge-active", inactive: "badge-inactive", pending: "badge-pending" };
            const labels = { active: "نشط", inactive: "غير نشط", pending: "معلق" };
            return `<span class="badge ${map[status] || "badge-pending"}">${labels[status] || status}</span>`;
        }

        // جلب المجموعات
        function loadGroups() {
            if (!academyId) {
                console.warn("⚠️ academyId غير معرف، لا يمكن تحميل المجموعات");
                return;
            }
            const q = query(collection(db, "academies", academyId, "groups"), orderBy("name", "asc"));
            onSnapshot(q, (snapshot) => {
                let html = `<span class="group-badge active" data-group="all">جميع الطلاب</span>`;
                let options = `<option value="all">جميع الطلاب</option>`;
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    html += `<span class="group-badge" data-group="${doc.id}">${data.name}</span>`;
                    options += `<option value="${doc.id}">${data.name}</option>`;
                });
                document.getElementById("groupsContainer").innerHTML = html;
                document.getElementById("studentGroup").innerHTML = options;
                
                // تفعيل فلترة المجموعات
                document.querySelectorAll(".group-badge").forEach(badge => {
                    badge.addEventListener("click", function() {
                        document.querySelectorAll(".group-badge").forEach(b => b.classList.remove("active"));
                        this.classList.add("active");
                        loadStudents(this.dataset.group);
                    });
                });
            }, (error) => {
                console.error("❌ خطأ في تحميل المجموعات:", error);
            });
        }

        // جلب الطلاب
        window.loadStudents = function(groupId = "all") {
            const tbody = document.getElementById("studentsTableBody");
            if (!academyId) {
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-red-500 py-4">صلاحيات غير كافية أو لم يتم تسجيل الدخول</td></tr>`;
                return;
            }

            const ref = collection(db, "academies", academyId, "students");
            let q;
            
            // ✅ إصلاح: تحقق مما إذا كانت `groupId` موجودة وليست "all"
            if (groupId && groupId !== "all") {
                q = query(ref, where("groupId", "==", groupId), orderBy("createdAt", "desc"));
            } else {
                q = query(ref, orderBy("createdAt", "desc"));
            }

            // ✅ استخدام onSnapshot للاستماع الفوري
            const unsubscribe = onSnapshot(q, (snapshot) => {
                console.log(`📊 تم جلب ${snapshot.size} طالب`); // ✅ طباعة عدد الطلاب في الكونسول
            
                if (snapshot.empty) {
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center text-gray-400 py-8">لا يوجد طلاب حتى الآن</td></tr>`;
                    return;
                }
                
                let html = "";
                snapshot.forEach((doc) => {
                    const data = doc.data();
                    html += `
                        <tr>
                            <td class="font-medium">${data.fullName || "غير محدد"}</td>
                            <td>${data.email || "-"}</td>
                            <td class="hidden sm:table-cell">${data.phone || "-"}</td>
                            <td><span class="text-xs text-[#555555]">${data.groupName || "-"}</span></td>
                            <td>${getStatusBadge(data.status || "pending")}</td>
                            <td class="text-center whitespace-nowrap">
                                <button onclick="editStudent('${doc.id}')" class="btn-sm btn-edit"><i class="fas fa-edit"></i></button>
                                <button onclick="deleteStudent('${doc.id}')" class="btn-sm btn-danger"><i class="fas fa-trash"></i></button>
                            </td>
                        </tr>`;
                });
                tbody.innerHTML = html;
            }, (error) => {
                console.error("❌ خطأ في جلب الطلاب:", error);
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-red-500 py-4">خطأ في جلب البيانات: ${error.message}</td></tr>`;
            });

            // ✅ حفظ مرجع الـ unsubscribe للتخلص منه لاحقاً (اختياري)
            window.__unsubscribeStudents = unsubscribe;
        };

        // إضافة أو تعديل طالب
        document.getElementById("studentForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            if(!academyId) {
                showToast("غير مصرح لك بإضافة بيانات", "error");
                return;
            }

            const id = document.getElementById("studentId").value;
            const groupSelect = document.getElementById("studentGroup");
            
            const data = {
                fullName: document.getElementById("studentName").value.trim(),
                email: document.getElementById("studentEmail").value.trim(),
                phone: document.getElementById("studentPhone").value.trim(),
                groupId: groupSelect.value === "all" ? null : groupSelect.value,
                groupName: groupSelect.value === "all" ? null : groupSelect.options[groupSelect.selectedIndex].text,
                status: document.getElementById("studentStatus").value,
                updatedAt: serverTimestamp()
            };

            // التحقق من البيانات
            if (!data.fullName || !data.email) {
                document.getElementById("modalMessage").textContent = "الاسم والبريد الإلكتروني مطلوبان";
                document.getElementById("modalMessage").className = "message-box error";
                return;
            }

            try {
                if (id) {
                    await updateDoc(doc(db, "academies", academyId, "students", id), data);
                    showToast("تم التعديل بنجاح", "success");
                } else {
                    data.createdAt = serverTimestamp();
                    await addDoc(collection(db, "academies", academyId, "students"), data);
                    showToast("تمت الإضافة بنجاح", "success");
                }
                document.getElementById("studentModal").classList.remove("show");
                // ✅ إعادة تحميل الطلاب بعد الإضافة
                loadStudents();
            } catch (error) {
                console.error("❌ خطأ في حفظ الطالب:", error);
                showToast("فشل الحفظ: " + error.message, "error");
            }
        });

        // إنشاء مجموعة
        document.getElementById("groupForm").addEventListener("submit", async (e) => {
            e.preventDefault();
            if(!academyId) {
                showToast("غير مصرح لك بإضافة بيانات", "error");
                return;
            }
            const name = document.getElementById("groupName").value.trim();
            if (!name) {
                document.getElementById("groupMessage").textContent = "يرجى إدخال اسم المجموعة";
                document.getElementById("groupMessage").className = "message-box error";
                return;
            }
            try {
                await addDoc(collection(db, "academies", academyId, "groups"), { 
                    name, 
                    createdAt: serverTimestamp() 
                });
                showToast("تم إنشاء المجموعة", "success");
                document.getElementById("groupModal").classList.remove("show");
            } catch (error) {
                console.error("❌ خطأ في إنشاء المجموعة:", error);
                showToast("فشل الإنشاء: " + error.message, "error");
            }
        });

        // دوال التعديل والحذف (نربطها بالـ Window لتعمل من الـ HTML مباشرة)
        window.editStudent = async (id) => {
            try {
                const docSnap = await getDoc(doc(db, "academies", academyId, "students", id));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    document.getElementById("studentId").value = id;
                    document.getElementById("studentName").value = data.fullName || "";
                    document.getElementById("studentEmail").value = data.email || "";
                    document.getElementById("studentPhone").value = data.phone || "";
                    document.getElementById("studentGroup").value = data.groupId || "all";
                    document.getElementById("studentStatus").value = data.status || "active";
                    document.getElementById("modalTitle").textContent = "تعديل الطالب";
                    document.getElementById("studentModal").classList.add("show");
                } else {
                    showToast("الطالب غير موجود", "error");
                }
            } catch (error) {
                console.error("❌ خطأ في جلب بيانات الطالب:", error);
                showToast("فشل جلب البيانات: " + error.message, "error");
            }
        };

        window.deleteStudent = async (id) => {
            const result = await Swal.fire({
                title: "هل أنت متأكد؟",
                text: "لن تتمكن من استعادة هذا الطالب!",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#EF4444",
                cancelButtonColor: "#94a3b8",
                confirmButtonText: "نعم، احذف",
                cancelButtonText: "إلغاء",
            });
            
            if (result.isConfirmed) {
                try {
                    await deleteDoc(doc(db, "academies", academyId, "students", id));
                    showToast("تم الحذف بنجاح", "success");
                    // ✅ إعادة تحميل الطلاب بعد الحذف
                    loadStudents();
                } catch (error) {
                    console.error("❌ خطأ في حذف الطالب:", error);
                    showToast("فشل الحذف: " + error.message, "error");
                }
            }
        };

        // تسجيل الخروج
        document.getElementById("logoutBtn")?.addEventListener("click", () => {
            signOut(auth).then(() => window.location.href = "../login.html");
        });

        // ✅ التحقق من حالة تسجيل الدخول وبدء التشغيل
        onAuthStateChanged(auth, async (user) => {
            console.log("🔄 onAuthStateChanged:", user ? user.uid : "لا يوجد مستخدم");
            
            if (!user) {
                window.location.href = "../login.html";
                return;
            }
            
            try {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                console.log("📄 بيانات المستخدم:", userDoc.exists() ? userDoc.data() : "غير موجود");
                
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    // ✅ التحقق من وجود academyId في بيانات المستخدم
                    if (data.academyId) {
                        academyId = data.academyId;
                    } else {
                        // ✅ إذا لم يكن موجوداً، استخدم uid كـ academyId (احتياطي)
                        academyId = user.uid;
                        console.warn("⚠️ academyId غير موجود في بيانات المستخدم، تم استخدام uid كقيمة احتياطية:", academyId);
                    }
                    console.log("🏫 academyId المستخدم:", academyId);
                    
                    // ✅ تحميل البيانات
                    loadGroups();
                    loadStudents();
                } else {
                    console.error("❌ لم يتم العثور على وثيقة المستخدم في Firestore");
                    window.location.href = "../register.html";
                }
            } catch (error) {
                console.error("❌ خطأ في تحميل بيانات المستخدم:", error);
                document.getElementById("studentsTableBody").innerHTML = 
                    `<tr><td colspan="6" class="text-center text-red-500 py-4">فشل الاتصال بقاعدة البيانات: ${error.message}</td></tr>`;
            }
        });

        console.log("✅ صفحة الطلاب جاهزة مع Firebase");
    </script>
</body>
</html>
