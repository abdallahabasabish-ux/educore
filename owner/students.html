<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>الطلاب – مداد العلم</title>

    <!-- ===== أمان: جميع الطلبات عبر HTTPS (سيتم فرضه في Firebase Hosting) ===== -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Cairo:wght@300..700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.13/dist/lenis.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="../assets/css/style.css" />

    <style>
        /* ===== تنسيقات خاصة (نفس السابق) ===== */
        body { background: #f5f5f5; margin: 0; padding: 0; font-family: 'Inter', 'Cairo', sans-serif; }
        /* ... باقي التنسيقات ... (نفسها) */
    </style>
</head>
<body>

    <!-- ===== القائمة الجانبية ===== -->
    <div id="sidebarOverlay" class="sidebar-overlay"></div>
    <aside id="sidebar" class="sidebar">
        <!-- ... نفس المحتوى ... -->
    </aside>

    <!-- ===== المحتوى الرئيسي ===== -->
    <main class="main-content">
        <!-- ===== رأس الصفحة ===== -->
        <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-3 mb-5">
            <h1 class="text-xl md:text-2xl font-bold text-[#000000]">إدارة الطلاب</h1>
            <div class="flex gap-2 flex-wrap">
                <button id="addStudentBtn" class="btn-primary text-sm">
                    <i class="fas fa-plus"></i> إضافة طالب
                </button>
                <button id="addGroupBtn" class="btn-secondary text-sm">
                    <i class="fas fa-layer-group"></i> مجموعة
                </button>
            </div>
        </div>

        <!-- ===== المجموعات ===== -->
        <div class="bg-white rounded-2xl shadow-sm border border-[#E5E5E5] p-4 mb-4">
            <h3 class="text-sm font-semibold text-[#000000] mb-2">المجموعات</h3>
            <div id="groupsContainer" class="flex flex-wrap gap-2">
                <span class="group-badge active" data-group="all">جميع الطلاب</span>
            </div>
        </div>

        <!-- ===== جدول الطلاب ===== -->
        <div class="bg-white rounded-2xl shadow-sm border border-[#E5E5E5] overflow-hidden">
            <div class="table-wrap">
                <table>
                    <thead>
                        <tr>
                            <th>الاسم</th>
                            <th>البريد الإلكتروني</th>
                            <th class="hidden sm:table-cell">الهاتف</th>
                            <th>المجموعة</th>
                            <th>الحالة</th>
                            <th class="text-center">الإجراءات</th>
                        </tr>
                    </thead>
                    <tbody id="studentsTableBody">
                        <tr>
                            <td colspan="6" class="text-center text-gray-400 py-8">
                                <i class="fas fa-spinner fa-spin ml-2"></i> جاري التحميل...
                            </td>
                        </tr>
                    </tbody>
                </table>
            </div>
        </div>

        <!-- ===== زر تحديث ===== -->
        <div class="mt-3 text-center md:hidden">
            <button id="refreshBtnMobile" class="text-sm text-[#2563EB] hover:underline flex items-center justify-center gap-1 w-full py-2">
                <i class="fas fa-sync-alt"></i> تحديث البيانات
            </button>
        </div>
    </main>

    <!-- ===== مودال إضافة/تعديل طالب ===== -->
    <div id="studentModal" class="modal-overlay">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-4">
                <h2 id="modalTitle" class="text-lg font-bold text-[#000000]">إضافة طالب جديد</h2>
                <button class="close-btn" id="closeModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <form id="studentForm">
                <input type="hidden" id="studentId" />
                <div class="form-group">
                    <label for="studentName">الاسم الكامل</label>
                    <input type="text" id="studentName" class="form-control" placeholder="أحمد محمد" required />
                </div>
                <div class="form-group">
                    <label for="studentEmail">البريد الإلكتروني</label>
                    <input type="email" id="studentEmail" class="form-control" placeholder="example@email.com" required />
                </div>
                <div class="form-group">
                    <label for="studentPhone">رقم الهاتف</label>
                    <input type="tel" id="studentPhone" class="form-control" placeholder="+966 55 123 4567" />
                </div>
                <div class="form-group">
                    <label for="studentGroup">المجموعة</label>
                    <select id="studentGroup" class="form-control">
                        <option value="all">جميع الطلاب</option>
                    </select>
                </div>
                <div class="form-group">
                    <label for="studentStatus">الحالة</label>
                    <select id="studentStatus" class="form-control">
                        <option value="active">نشط</option>
                        <option value="inactive">غير نشط</option>
                        <option value="pending">معلق</option>
                    </select>
                </div>
                <div id="modalMessage" class="message-box"></div>
                <button type="submit" class="btn-primary w-full mt-2">
                    <i class="fas fa-save"></i> حفظ
                </button>
            </form>
        </div>
    </div>

    <!-- ===== مودال إنشاء مجموعة ===== -->
    <div id="groupModal" class="modal-overlay">
        <div class="modal-box">
            <div class="flex items-center justify-between mb-4">
                <h2 class="text-lg font-bold text-[#000000]">إنشاء مجموعة جديدة</h2>
                <button class="close-btn" id="closeGroupModalBtn"><i class="fas fa-times"></i></button>
            </div>
            <form id="groupForm">
                <div class="form-group">
                    <label for="groupName">اسم المجموعة</label>
                    <input type="text" id="groupName" class="form-control" placeholder="المجموعة أ" required />
                </div>
                <div id="groupMessage" class="message-box"></div>
                <button type="submit" class="btn-primary w-full mt-2">
                    <i class="fas fa-save"></i> إنشاء
                </button>
            </form>
        </div>
    </div>

    <!-- ========================================================= -->
    <!-- ===== SCRIPTS ===== -->
    <!-- ========================================================= -->
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <!-- ===== Import Map (Firebase v10) ===== -->
    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"
            }
        }
    </script>

    <script type="module">
        // ============================================================
        // owner/students.js – مع تطبيق مبادئ الأمان
        // ============================================================

        // ===== استيراد Firebase من الملف المركزي =====
        // (يتم استخدام متغيرات البيئة داخل الملف المركزي، وليس هنا)
        import { auth, db } from '../assets/js/firebase-config.js';

        import { onAuthStateChanged, signOut } from "firebase/auth";
        import {
            collection,
            doc,
            getDoc,
            getDocs,
            addDoc,
            updateDoc,
            deleteDoc,
            onSnapshot,
            query,
            where,
            orderBy,
            serverTimestamp,
            getCountFromServer,
        } from "firebase/firestore";

        // ============================================================
        // دوال مساعدة (Toast, Badge)
        // ============================================================
        function showToast(message, type = "error") {
            Toastify({
                text: message,
                duration: 4000,
                gravity: "top",
                position: "center",
                style: {
                    background: type === "success" ? "#22C55E" : "#EF4444",
                    borderRadius: "12px",
                    padding: "12px 24px",
                    boxShadow: "0 8px 24px rgba(0,0,0,0.15)",
                },
                stopOnFocus: true,
            }).showToast();
        }

        function getStatusBadge(status) {
            const map = {
                active: "badge-active",
                inactive: "badge-inactive",
                pending: "badge-pending",
            };
            const labels = {
                active: "نشط",
                inactive: "غير نشط",
                pending: "معلق",
            };
            return `<span class="badge ${map[status] || "badge-pending"}">${labels[status] || status}</span>`;
        }

        // ============================================================
        // عناصر DOM
        // ============================================================
        const tbody = document.getElementById("studentsTableBody");
        const groupsContainer = document.getElementById("groupsContainer");
        const modal = document.getElementById("studentModal");
        const groupModal = document.getElementById("groupModal");
        const closeModalBtn = document.getElementById("closeModalBtn");
        const closeGroupModalBtn = document.getElementById("closeGroupModalBtn");
        const addStudentBtn = document.getElementById("addStudentBtn");
        const addGroupBtn = document.getElementById("addGroupBtn");
        const form = document.getElementById("studentForm");
        const groupForm = document.getElementById("groupForm");
        const studentIdInput = document.getElementById("studentId");
        const nameInput = document.getElementById("studentName");
        const emailInput = document.getElementById("studentEmail");
        const phoneInput = document.getElementById("studentPhone");
        const groupSelect = document.getElementById("studentGroup");
        const statusInput = document.getElementById("studentStatus");
        const messageEl = document.getElementById("modalMessage");
        const groupMessageEl = document.getElementById("groupMessage");
        const groupNameInput = document.getElementById("groupName");
        const refreshBtnMobile = document.getElementById("refreshBtnMobile");

        let academyId = null;
        let currentUser = null;
        let unsubscribeStudents = null;
        let unsubscribeGroups = null;

        // ============================================================
        // عرض رسائل في المودال
        // ============================================================
        function showModalMessage(text, type = "error") {
            messageEl.textContent = text;
            messageEl.className = `message-box ${type}`;
            clearTimeout(messageEl._timeout);
            messageEl._timeout = setTimeout(() => {
                messageEl.className = "message-box";
                messageEl.textContent = "";
            }, 5000);
        }

        function showGroupMessage(text, type = "error") {
            groupMessageEl.textContent = text;
            groupMessageEl.className = `message-box ${type}`;
            clearTimeout(groupMessageEl._timeout);
            groupMessageEl._timeout = setTimeout(() => {
                groupMessageEl.className = "message-box";
                groupMessageEl.textContent = "";
            }, 5000);
        }

        // ============================================================
        // 1. تحميل المجموعات (مع أمان: قراءة فقط داخل الأكاديمية)
        // ============================================================
        function loadGroups() {
            if (!academyId) {
                console.warn("⚠️ loadGroups: academyId غير معرف");
                return;
            }

            if (unsubscribeGroups) {
                unsubscribeGroups();
                unsubscribeGroups = null;
            }

            const groupsRef = collection(db, "academies", academyId, "groups");
            const q = query(groupsRef, orderBy("name", "asc"));

            try {
                unsubscribeGroups = onSnapshot(q, (snapshot) => {
                    let html = `<span class="group-badge active" data-group="all">جميع الطلاب</span>`;
                    let options = `<option value="all">جميع الطلاب</option>`;

                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        html += `<span class="group-badge" data-group="${doc.id}">${data.name}</span>`;
                        options += `<option value="${doc.id}">${data.name}</option>`;
                    });

                    groupsContainer.innerHTML = html;
                    groupSelect.innerHTML = options;

                    // إضافة حدث النقر على المجموعات
                    document.querySelectorAll(".group-badge").forEach((badge) => {
                        badge.addEventListener("click", function() {
                            document.querySelectorAll(".group-badge").forEach((b) => b.classList.remove("active"));
                            this.classList.add("active");
                            const groupId = this.dataset.group;
                            loadStudents(groupId);
                        });
                    });

                    console.log("✅ تم تحميل المجموعات بنجاح، العدد:", snapshot.size);
                }, (error) => {
                    console.error("❌ خطأ في تحميل المجموعات:", error);
                    groupsContainer.innerHTML = `<span class="text-red-500 text-sm">حدث خطأ في تحميل المجموعات</span>`;
                });
            } catch (error) {
                console.error("❌ استثناء في loadGroups:", error);
            }
        }

        // ============================================================
        // 2. تحميل الطلاب (مع أمان: قراءة فقط داخل الأكاديمية)
        // ============================================================
        function loadStudents(groupId = "all") {
            if (!academyId) {
                console.warn("⚠️ loadStudents: academyId غير معرف");
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-gray-400 py-8">لم يتم تحديد الأكاديمية</td></tr>`;
                return;
            }

            if (unsubscribeStudents) {
                unsubscribeStudents();
                unsubscribeStudents = null;
            }

            const studentsRef = collection(db, "academies", academyId, "students");
            let q;

            if (groupId === "all") {
                q = query(studentsRef, orderBy("createdAt", "desc"));
            } else {
                q = query(
                    studentsRef,
                    where("groupId", "==", groupId),
                    orderBy("createdAt", "desc")
                );
            }

            try {
                unsubscribeStudents = onSnapshot(q, (snapshot) => {
                    if (snapshot.empty) {
                        tbody.innerHTML = `
                            <tr>
                                <td colspan="6" class="text-center text-gray-400 py-8">
                                    <i class="fas fa-user-graduate text-3xl opacity-30 block mb-2"></i>
                                    <p class="text-sm">لا يوجد طلاب</p>
                                    <p class="text-xs mt-1">اضغط على "إضافة طالب" لإضافة أول طالب</p>
                                </td>
                            </tr>
                        `;
                        console.log("📭 لا يوجد طلاب في هذه الأكاديمية");
                        return;
                    }

                    let html = "";
                    snapshot.forEach((doc) => {
                        const data = doc.data();
                        const groupName = data.groupName || "-";

                        html += `
                            <tr>
                                <td class="font-medium">${data.fullName || "غير محدد"}</td>
                                <td>${data.email || "-"}</td>
                                <td class="hidden sm:table-cell">${data.phone || "-"}</td>
                                <td><span class="text-xs text-[#555555]">${groupName}</span></td>
                                <td>${getStatusBadge(data.status || "pending")}</td>
                                <td class="text-center whitespace-nowrap">
                                    <button onclick="editStudent('${doc.id}')" class="btn-sm btn-edit" title="تعديل">
                                        <i class="fas fa-edit"></i>
                                    </button>
                                    <button onclick="deleteStudent('${doc.id}')" class="btn-sm btn-danger" title="حذف">
                                        <i class="fas fa-trash"></i>
                                    </button>
                                </td>
                            </tr>
                        `;
                    });
                    tbody.innerHTML = html;
                    console.log("✅ تم تحميل الطلاب بنجاح، العدد:", snapshot.size);
                }, (error) => {
                    console.error("❌ خطأ في تحميل الطلاب:", error);
                    tbody.innerHTML = `<tr><td colspan="6" class="text-center text-red-500 py-4">حدث خطأ في تحميل البيانات</td></tr>`;
                });
            } catch (error) {
                console.error("❌ استثناء في loadStudents:", error);
                tbody.innerHTML = `<tr><td colspan="6" class="text-center text-red-500 py-4">حدث خطأ غير متوقع</td></tr>`;
            }
        }

        // ============================================================
        // 3. إضافة/تعديل طالب (مع أمان: التحقق من الصلاحيات على الخادم)
        //    (يتم التحقق أيضاً عبر Security Rules)
        // ============================================================
        form.addEventListener("submit", async (e) => {
            e.preventDefault();

            const id = studentIdInput.value;
            const groupId = groupSelect.value;
            const groupName = groupSelect.options[groupSelect.selectedIndex]?.text || "";

            const data = {
                fullName: nameInput.value.trim(),
                email: emailInput.value.trim(),
                phone: phoneInput.value.trim(),
                groupId: groupId === "all" ? null : groupId,
                groupName: groupId === "all" ? null : groupName,
                status: statusInput.value,
                updatedAt: serverTimestamp(),
            };

            if (!data.fullName || !data.email) {
                showModalMessage("الاسم والبريد الإلكتروني مطلوبان", "error");
                return;
            }

            try {
                if (id) {
                    await updateDoc(doc(db, "academies", academyId, "students", id), data);
                    showToast("تم تحديث الطالب بنجاح", "success");
                } else {
                    // التحقق من عدم تكرار البريد الإلكتروني
                    const studentsRef = collection(db, "academies", academyId, "students");
                    const q = query(studentsRef, where("email", "==", data.email));
                    const snapshot = await getDocs(q);
                    if (!snapshot.empty) {
                        showModalMessage("البريد الإلكتروني مستخدم بالفعل", "error");
                        return;
                    }

                    data.createdAt = serverTimestamp();
                    await addDoc(collection(db, "academies", academyId, "students"), data);

                    // تحديث عدد الطلاب في الأكاديمية
                    const academyRef = doc(db, "academies", academyId);
                    const academySnap = await getDoc(academyRef);
                    if (academySnap.exists()) {
                        const currentCount = academySnap.data().studentCount || 0;
                        await updateDoc(academyRef, {
                            studentCount: currentCount + 1,
                            updatedAt: serverTimestamp(),
                        });
                    }

                    showToast("تم إضافة الطالب بنجاح", "success");
                }
                closeModal();
            } catch (error) {
                console.error("❌ خطأ في حفظ الطالب:", error);
                showModalMessage("فشل حفظ الطالب: " + error.message, "error");
            }
        });

        // ============================================================
        // 4. تعديل طالب
        // ============================================================
        window.editStudent = async (id) => {
            try {
                const docSnap = await getDoc(doc(db, "academies", academyId, "students", id));
                if (docSnap.exists()) {
                    const data = docSnap.data();
                    studentIdInput.value = id;
                    nameInput.value = data.fullName || "";
                    emailInput.value = data.email || "";
                    phoneInput.value = data.phone || "";
                    groupSelect.value = data.groupId || "all";
                    statusInput.value = data.status || "active";
                    document.getElementById("modalTitle").textContent = "تعديل الطالب";
                    modal.classList.add("show");
                    messageEl.className = "message-box";
                    messageEl.textContent = "";
                } else {
                    showToast("الطالب غير موجود", "error");
                }
            } catch (error) {
                console.error("❌ خطأ في تحميل بيانات الطالب:", error);
                showToast("فشل تحميل بيانات الطالب: " + error.message, "error");
            }
        };

        // ============================================================
        // 5. حذف طالب (مع تسجيل الحدث)
        // ============================================================
        window.deleteStudent = async (id) => {
            const result = await Swal.fire({
                title: "هل أنت متأكد؟",
                text: "لن تتمكن من استعادة هذا الطالب!",
                icon: "warning",
                showCancelButton: true,
                confirmButtonColor: "#EF4444",
                cancelButtonColor: "#94a3b8",
                confirmButtonText: "نعم، احذف",
                cancelButtonText: "إلغاء",
            });

            if (result.isConfirmed) {
                try {
                    // تسجيل الحدث قبل الحذف (لأغراض المراجعة)
                    console.log(`🔍 حذف طالب: ${id} بواسطة ${currentUser?.uid}`);
                    await deleteDoc(doc(db, "academies", academyId, "students", id));

                    // تحديث عدد الطلاب
                    const academyRef = doc(db, "academies", academyId);
                    const academySnap = await getDoc(academyRef);
                    if (academySnap.exists()) {
                        const currentCount = academySnap.data().studentCount || 0;
                        await updateDoc(academyRef, {
                            studentCount: Math.max(0, currentCount - 1),
                            updatedAt: serverTimestamp(),
                        });
                    }

                    showToast("تم حذف الطالب بنجاح", "success");
                } catch (error) {
                    console.error("❌ خطأ في حذف الطالب:", error);
                    showToast("فشل حذف الطالب: " + error.message, "error");
                }
            }
        };

        // ============================================================
        // 6. إنشاء مجموعة جديدة (مع التحقق)
        // ============================================================
        groupForm.addEventListener("submit", async (e) => {
            e.preventDefault();

            const name = groupNameInput.value.trim();
            if (!name) {
                showGroupMessage("يرجى إدخال اسم المجموعة", "error");
                return;
            }

            try {
                await addDoc(collection(db, "academies", academyId, "groups"), {
                    name: name,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                });
                showToast("تم إنشاء المجموعة بنجاح", "success");
                groupNameInput.value = "";
                closeGroupModal();
            } catch (error) {
                console.error("❌ خطأ في إنشاء المجموعة:", error);
                showGroupMessage("فشل إنشاء المجموعة: " + error.message, "error");
            }
        });

        // ============================================================
        // 7. التحكم بالمودال
        // ============================================================
        function openModal() {
            studentIdInput.value = "";
            form.reset();
            statusInput.value = "active";
            document.getElementById("modalTitle").textContent = "إضافة طالب جديد";
            messageEl.className = "message-box";
            messageEl.textContent = "";
            modal.classList.add("show");
            console.log("✅ فتح مودال إضافة طالب");
        }

        function closeModal() {
            modal.classList.remove("show");
        }

        function openGroupModal() {
            groupNameInput.value = "";
            groupMessageEl.className = "message-box";
            groupMessageEl.textContent = "";
            groupModal.classList.add("show");
        }

        function closeGroupModal() {
            groupModal.classList.remove("show");
        }

        // ربط الأحداث
        if (addStudentBtn) {
            addStudentBtn.addEventListener("click", openModal);
            console.log("✅ تم ربط حدث زر إضافة طالب");
        } else {
            console.warn("⚠️ لم يتم العثور على زر addStudentBtn");
        }

        if (closeModalBtn) {
            closeModalBtn.addEventListener("click", closeModal);
        }

        if (addGroupBtn) {
            addGroupBtn.addEventListener("click", openGroupModal);
        }

        if (closeGroupModalBtn) {
            closeGroupModalBtn.addEventListener("click", closeGroupModal);
        }

        modal.addEventListener("click", (e) => {
            if (e.target === modal) closeModal();
        });
        groupModal.addEventListener("click", (e) => {
            if (e.target === groupModal) closeGroupModal();
        });

        // ============================================================
        // 8. تحديث البيانات
        // ============================================================
        async function refreshData() {
            loadGroups();
            loadStudents();
            showToast("تم تحديث البيانات", "success");
        }

        if (refreshBtnMobile) {
            refreshBtnMobile.addEventListener("click", refreshData);
        }

        // ============================================================
        // 9. مراقبة حالة المصادقة (مع التحقق من الصلاحية)
        // ============================================================
        onAuthStateChanged(auth, async (user) => {
            if (!user) {
                window.location.href = "../login.html";
                return;
            }
            currentUser = user;
            console.log("✅ المستخدم مسجل:", user.uid);

            try {
                const userDoc = await getDoc(doc(db, "users", user.uid));
                if (userDoc.exists()) {
                    const data = userDoc.data();
                    console.log("📄 بيانات المستخدم:", data);
                    // أمان: التحقق من الدور
                    if (data.role !== "owner" && data.role !== "super_admin") {
                        showToast("ليس لديك صلاحية الوصول لهذه الصفحة", "error");
                        setTimeout(() => {
                            window.location.href = "../dashboard.html";
                        }, 1500);
                        return;
                    }
                    academyId = data.academyId || user.uid;
                    console.log("🏫 academyId:", academyId);
                    loadGroups();
                    loadStudents();
                } else {
                    console.warn("⚠️ لم يتم العثور على وثيقة المستخدم في Firestore");
                    window.location.href = "../register.html";
                }
            } catch (error) {
                console.error("❌ خطأ في تحميل بيانات المستخدم:", error);
                showToast("فشل تحميل بيانات المستخدم: " + error.message, "error");
            }
        });

        // ============================================================
        // 10. تسجيل الخروج
        // ============================================================
        document.getElementById("logoutBtn")?.addEventListener("click", async () => {
            try {
                await signOut(auth);
                window.location.href = "../login.html";
            } catch (error) {
                showToast("فشل تسجيل الخروج: " + error.message, "error");
            }
        });

        // ============================================================
        // 11. القائمة الجانبية
        // ============================================================
        const sidebar = document.getElementById("sidebar");
        const overlay = document.getElementById("sidebarOverlay");
        const openBtn = document.getElementById("openSidebarBtn");
        const closeBtn = document.getElementById("closeSidebarBtn");

        function openSidebar() {
            sidebar.classList.add("open");
            overlay.classList.add("show");
            document.body.style.overflow = "hidden";
        }

        function closeSidebar() {
            sidebar.classList.remove("open");
            overlay.classList.remove("show");
            document.body.style.overflow = "";
        }

        if (openBtn) openBtn.addEventListener("click", openSidebar);
        if (closeBtn) closeBtn.addEventListener("click", closeSidebar);
        if (overlay) overlay.addEventListener("click", closeSidebar);
        document.querySelectorAll("#sidebar a").forEach((link) => {
            link.addEventListener("click", closeSidebar);
        });

        window.addEventListener("resize", () => {
            if (window.innerWidth >= 768) closeSidebar();
        });

        // ============================================================
        // 12. Lenis Smooth Scroll
        // ============================================================
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            orientation: "vertical",
            gestureOrientation: "vertical",
            smoothWheel: true,
            wheelMultiplier: 1,
            touchMultiplier: 2,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        console.log("✅ مداد العلم — صفحة الطلاب (Owner) مع إجراءات الأمان");
    </script>

</body>
</html>
