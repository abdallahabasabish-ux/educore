<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الملف الشخصي – EduCore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="bg-gray-50 min-h-screen">
  <div class="flex">
    <!-- القائمة الجانبية -->
    <div class="w-64 h-screen bg-white border-l border-gray-200 p-4 fixed right-0 top-0 overflow-y-auto">
      <a href="/" class="text-2xl font-extrabold text-[#4B5563] block mb-8"><i class="fas fa-graduation-cap ml-2"></i>EduCore</a>
      <nav class="space-y-1">
        <a href="/dashboard" class="block px-4 py-2 rounded-lg hover:bg-gray-100 transition"><i class="fas fa-chart-pie ml-2 w-5"></i>لوحة التحكم</a>
        <a href="/profile" class="block px-4 py-2 rounded-lg bg-[#4B5563] text-white"><i class="fas fa-user ml-2 w-5"></i>الملف الشخصي</a>
        <a href="/settings" class="block px-4 py-2 rounded-lg hover:bg-gray-100 transition"><i class="fas fa-cog ml-2 w-5"></i>الإعدادات</a>
        <button id="logout-btn" class="block w-full text-right px-4 py-2 rounded-lg text-red-600 hover:bg-red-50 transition"><i class="fas fa-sign-out-alt ml-2 w-5"></i>تسجيل الخروج</button>
      </nav>
    </div>

    <!-- المحتوى -->
    <div class="mr-64 p-6 w-full">
      <h1 class="text-2xl font-bold mb-6">الملف الشخصي</h1>
      <div class="bg-white rounded-2xl shadow-sm border border-gray-200 p-6 max-w-2xl">
        <div class="flex items-center gap-4 mb-6">
          <img id="profile-avatar" src="https://ui-avatars.com/api/?name=User&size=80" class="w-20 h-20 rounded-full border-2 border-[#4B5563]/20" />
          <div>
            <h2 id="profile-name" class="text-xl font-bold">مستخدم</h2>
            <p id="profile-email" class="text-gray-500">user@email.com</p>
          </div>
        </div>
        <form id="profile-form" class="space-y-4">
          <div>
            <label class="block text-sm font-medium text-gray-700">الاسم الكامل</label>
            <input type="text" id="fullName" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:ring-2 focus:ring-[#4B5563] focus:outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">البريد الإلكتروني</label>
            <input type="email" id="email" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:ring-2 focus:ring-[#4B5563] focus:outline-none" />
          </div>
          <div>
            <label class="block text-sm font-medium text-gray-700">رقم الهاتف</label>
            <input type="tel" id="phone" class="w-full rounded-xl border border-gray-300 px-4 py-2 focus:ring-2 focus:ring-[#4B5563] focus:outline-none" />
          </div>
          <button type="submit" class="bg-[#4B5563] text-white px-6 py-2 rounded-xl hover:bg-[#3b4553] transition font-semibold">حفظ التغييرات</button>
        </form>
      </div>
    </div>
  </div>

  <script type="module" src="assets/js/pages/profile.js"></script>
</body>
</html>
