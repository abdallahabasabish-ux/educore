<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء أكاديمية – مداد العلم</title>

    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Cairo:wght@300..700&display=swap" rel="stylesheet" />
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.13/dist/lenis.css" />
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
    <link rel="stylesheet" href="assets/css/style.css" />

    <style>
        body {
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            margin: 0;
        }
        .register-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 2rem 1.75rem;
            max-width: 560px;
            width: 100%;
            box-shadow: 0 16px 48px -12px rgba(0, 0, 0, 0.08);
            border: 1px solid #e5e5e5;
        }
        .logo { text-align: center; margin-bottom: 1.75rem; }
        .logo i { font-size: 2.2rem; color: #000000; }
        .logo h1 { font-size: 1.5rem; font-weight: 800; margin-top: 0.25rem; color: #000000; }
        .logo p { color: #555555; font-size: 0.875rem; margin-top: 0.25rem; }

        .form-group { margin-bottom: 1.1rem; }
        .form-group label { display: block; font-size: 0.8rem; font-weight: 600; color: #000000; margin-bottom: 0.3rem; }
        .form-control {
            width: 100%;
            padding: 0.6rem 0.875rem;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            background: #fafafa;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            color: #000000;
        }
        .form-control:focus {
            outline: none;
            border-color: #000000;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }
        .form-control::placeholder { color: #aaaaaa; }

        .btn-primary {
            background: #000000;
            color: #ffffff;
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 48px;
        }
        .btn-primary:hover { background: #222222; transform: translateY(-2px); box-shadow: 0 8px 24px -6px rgba(0, 0, 0, 0.2); }
        .btn-primary:disabled { opacity: 0.5; cursor: not-allowed; transform: none; }

        .message-box {
            padding: 0.6rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }
        .message-box.error { display: block; background: #fde8e8; color: #8a1a1a; border: 1px solid #fccccc; }
        .message-box.success { display: block; background: #e6f7e6; color: #0a5e0a; border: 1px solid #b8e6b8; }

        .role-hint {
            background: #f0f0f0;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.75rem;
            color: #333333;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            margin-top: 0.25rem;
        }

        @media (max-width: 480px) {
            .register-card { padding: 1.5rem 1.25rem; border-radius: 16px; }
            .logo i { font-size: 1.8rem; }
            .logo h1 { font-size: 1.25rem; }
            .form-control { padding: 0.5rem 0.75rem; font-size: 0.85rem; }
            .btn-primary { font-size: 0.85rem; min-height: 44px; padding: 0.6rem 1rem; }
        }
    </style>
</head>
<body>

    <div class="register-card">
        <div class="logo">
            <i class="fas fa-feather-alt"></i>
            <h1>مداد العلم</h1>
            <p>أنشئ أكاديميتك التعليمية</p>
        </div>

        <form id="registerAcademyForm" novalidate>

            <div class="form-group">
                <label for="academyName">اسم الأكاديمية</label>
                <input type="text" id="academyName" class="form-control" placeholder="أكاديمية المستقبل" required />
            </div>

            <div class="form-group">
                <label for="academySlug">الرابط المخصص <span class="text-xs text-[#555555]">(يستخدم في URL)</span></label>
                <div class="flex items-center border border-[#e5e5e5] rounded-10 bg-[#fafafa] focus-within:border-[#000000] transition">
                    <span class="text-sm text-[#555555] px-3 py-1 whitespace-nowrap">midad.com/</span>
                    <input type="text" id="academySlug" class="flex-1 border-0 bg-transparent px-2 py-0.6 text-sm focus:outline-none" placeholder="example-academy" required dir="ltr" />
                </div>
                <p class="text-xs text-[#888888] mt-1">يُستخدم هذا الرابط لدخول الطلاب إلى أكاديميتك</p>
            </div>

            <div class="form-group">
                <label for="teacherName">اسم المدرس المسؤول</label>
                <input type="text" id="teacherName" class="form-control" placeholder="أحمد محمد" required />
            </div>

            <div class="form-group">
                <label for="teacherEmail">البريد الإلكتروني للمدرس</label>
                <input type="email" id="teacherEmail" class="form-control" placeholder="teacher@example.com" required />
            </div>

            <div class="form-group">
                <label for="teacherPassword">كلمة مرور المدرس</label>
                <input type="password" id="teacherPassword" class="form-control" placeholder="••••••••" required minlength="6" />
            </div>

            <div class="form-group">
                <label for="teacherConfirm">تأكيد كلمة المرور</label>
                <input type="password" id="teacherConfirm" class="form-control" placeholder="••••••••" required minlength="6" />
            </div>

            <div class="role-hint">
                <i class="fas fa-chalkboard-teacher"></i>
                سيتم إنشاء حساب المدرس مع صلاحيات إدارة الأكاديمية
            </div>

            <div id="registerMessage" class="message-box"></div>

            <button type="submit" class="btn-primary" id="registerBtn">
                <i class="fas fa-school"></i> إنشاء الأكاديمية
            </button>

        </form>

        <p class="text-center text-sm text-[#555555] mt-4">
            لديك حساب بالفعل؟ <a href="login.html" class="text-[#000000] font-semibold hover:underline">تسجيل الدخول</a>
        </p>
    </div>

    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"
            }
        }
    </script>

    <script type="module">
        import { initializeApp } from "firebase/app";
        import { getAuth, createUserWithEmailAndPassword, setPersistence, browserLocalPersistence } from "firebase/auth";
        import { getFirestore, doc, setDoc, serverTimestamp } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyBsSP8Le5_nDG2YFiyGcZ6BFR7aLi3djLU",
            authDomain: "edu-core-ddb48.firebaseapp.com",
            projectId: "edu-core-ddb48",
            storageBucket: "edu-core-ddb48.firebasestorage.app",
            messagingSenderId: "4743644287",
            appId: "1:4743644287:web:9167749cc80417b6876b4a",
            measurementId: "G-S94FBCFCXW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const form = document.getElementById('registerAcademyForm');
        const messageEl = document.getElementById('registerMessage');
        const registerBtn = document.getElementById('registerBtn');

        const academyNameInput = document.getElementById('academyName');
        const academySlugInput = document.getElementById('academySlug');
        const teacherNameInput = document.getElementById('teacherName');
        const teacherEmailInput = document.getElementById('teacherEmail');
        const teacherPasswordInput = document.getElementById('teacherPassword');
        const teacherConfirmInput = document.getElementById('teacherConfirm');

        function showMessage(text, type = 'error') {
            messageEl.textContent = text;
            messageEl.className = `message-box ${type}`;
            clearTimeout(messageEl._timeout);
            messageEl._timeout = setTimeout(() => {
                messageEl.className = 'message-box';
                messageEl.textContent = '';
            }, 5000);
        }

        function setLoading(isLoading) {
            if (isLoading) {
                registerBtn.disabled = true;
                registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري الإنشاء...';
            } else {
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-school"></i> إنشاء الأكاديمية';
            }
        }

        form.addEventListener('submit', async (e) => {
            e.preventDefault();

            const academyName = academyNameInput.value.trim();
            const academySlug = academySlugInput.value.trim().toLowerCase().replace(/\s+/g, '-');
            const teacherName = teacherNameInput.value.trim();
            const teacherEmail = teacherEmailInput.value.trim();
            const teacherPassword = teacherPasswordInput.value;
            const teacherConfirm = teacherConfirmInput.value;

            if (!academyName || !academySlug || !teacherName || !teacherEmail || !teacherPassword || !teacherConfirm) {
                showMessage('يرجى ملء جميع الحقول المطلوبة', 'error');
                return;
            }

            if (teacherPassword.length < 6) {
                showMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }

            if (teacherPassword !== teacherConfirm) {
                showMessage('كلمات المرور غير متطابقة', 'error');
                return;
            }

            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(teacherEmail)) {
                showMessage('البريد الإلكتروني غير صحيح', 'error');
                return;
            }

            if (academySlug.length < 3 || academySlug.length > 30) {
                showMessage('الرابط المخصص يجب أن يكون بين 3 و 30 حرفاً', 'error');
                return;
            }

            // التحقق من صحة الرابط (حروف وأرقام وشرطة فقط)
            if (!/^[a-z0-9-]+$/.test(academySlug)) {
                showMessage('الرابط المخصص يحتوي على أحرف غير مسموحة', 'error');
                return;
            }

            setLoading(true);

            try {
                // 1. إنشاء حساب المدرس
                const userCredential = await createUserWithEmailAndPassword(auth, teacherEmail, teacherPassword);
                const user = userCredential.user;

                // 2. إنشاء الأكاديمية في Firestore
                const academyId = user.uid;
                const academyData = {
                    id: academyId,
                    name: academyName,
                    slug: academySlug,
                    ownerId: user.uid,
                    status: 'active',
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                    settings: {
                        language: 'ar',
                        currency: 'SAR',
                        theme: 'light',
                    }
                };
                await setDoc(doc(db, 'academies', academyId), academyData);

                // 3. إنشاء حساب المدرس في مجموعة users
                const userData = {
                    uid: user.uid,
                    fullName: teacherName,
                    email: teacherEmail,
                    role: 'owner',
                    status: 'active',
                    academyId: academyId,
                    academyName: academyName,
                    academySlug: academySlug,
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                };
                await setDoc(doc(db, 'users', user.uid), userData);

                // 4. إنشاء مجموعة الطلاب (جمعية) مرتبطة بالأكاديمية
                await setDoc(doc(db, 'academies', academyId, 'students', '_empty'), {
                    placeholder: true,
                    createdAt: serverTimestamp()
                });

                // 5. إنشاء رابط تسجيل الطلاب
                const studentRegisterUrl = `${window.location.origin}/student-register.html?academy=${academySlug}`;
                await setDoc(doc(db, 'academies', academyId, 'settings', 'registration'), {
                    studentRegisterUrl: studentRegisterUrl,
                    createdAt: serverTimestamp(),
                });

                showMessage('تم إنشاء الأكاديمية بنجاح! جاري التوجيه...', 'success');

                // حفظ معلومات المدرس في localStorage
                localStorage.setItem('academySlug', academySlug);
                localStorage.setItem('academyId', academyId);

                setTimeout(() => {
                    window.location.href = 'owner-dashboard.html';
                }, 2000);

            } catch (error) {
                let msg = 'فشل إنشاء الأكاديمية';
                if (error.code === 'auth/email-already-in-use') {
                    msg = 'البريد الإلكتروني مستخدم بالفعل';
                } else if (error.code === 'auth/invalid-email') {
                    msg = 'البريد الإلكتروني غير صحيح';
                } else if (error.code === 'auth/weak-password') {
                    msg = 'كلمة المرور ضعيفة جداً';
                } else if (error.code === 'auth/network-request-failed') {
                    msg = 'فشل الاتصال بالشبكة، تأكد من اتصال الإنترنت';
                } else {
                    msg = error.message;
                }
                showMessage(msg, 'error');
            } finally {
                setLoading(false);
            }
        });

        // ===== Lenis =====
        const lenis = new Lenis({ duration: 1.2 });
        function raf(time) { lenis.raf(time);
            requestAnimationFrame(raf); }
        requestAnimationFrame(raf);

        console.log('✅ مداد العلم — صفحة إنشاء الأكاديمية جاهزة');
    </script>

</body>
</html>
