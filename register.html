<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إنشاء حساب – EduCore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="assets/css/style.css">
</head>
<body class="min-h-screen flex items-center justify-center bg-gradient-to-br from-gray-50 to-gray-100 p-4">
  <div class="w-full max-w-md">
    <div class="bg-white/80 backdrop-blur-lg rounded-3xl shadow-2xl border border-white/30 p-8 transform transition-all hover:scale-[1.02] duration-300">
      <div class="text-center mb-8">
        <a href="/" class="text-3xl font-extrabold text-[#4B5563]"><i class="fas fa-graduation-cap ml-2"></i>EduCore</a>
        <h2 class="text-2xl font-bold mt-4">إنشاء حساب جديد</h2>
        <p class="text-gray-500 text-sm">ابدأ رحلتك مع EduCore</p>
      </div>

      <form id="register-form" class="space-y-4">
        <div>
          <label for="fullName" class="block text-sm font-medium text-gray-700">الاسم الكامل</label>
          <div class="relative">
            <i class="fas fa-user absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="fullName" required class="w-full rounded-xl border border-gray-300 bg-gray-50/50 pl-4 pr-10 py-2.5 focus:ring-2 focus:ring-[#4B5563] focus:border-transparent transition" placeholder="أحمد محمد" />
          </div>
        </div>
        <div>
          <label for="academyName" class="block text-sm font-medium text-gray-700">اسم الأكاديمية</label>
          <div class="relative">
            <i class="fas fa-building absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="text" id="academyName" required class="w-full rounded-xl border border-gray-300 bg-gray-50/50 pl-4 pr-10 py-2.5 focus:ring-2 focus:ring-[#4B5563] focus:border-transparent transition" placeholder="أكاديمية المستقبل" />
          </div>
        </div>
        <div>
          <label for="email" class="block text-sm font-medium text-gray-700">البريد الإلكتروني</label>
          <div class="relative">
            <i class="fas fa-envelope absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="email" id="email" required class="w-full rounded-xl border border-gray-300 bg-gray-50/50 pl-4 pr-10 py-2.5 focus:ring-2 focus:ring-[#4B5563] focus:border-transparent transition" placeholder="example@email.com" />
          </div>
        </div>
        <div>
          <label for="phone" class="block text-sm font-medium text-gray-700">رقم الهاتف</label>
          <div class="relative">
            <i class="fas fa-phone absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="tel" id="phone" class="w-full rounded-xl border border-gray-300 bg-gray-50/50 pl-4 pr-10 py-2.5 focus:ring-2 focus:ring-[#4B5563] focus:border-transparent transition" placeholder="+966 55 123 4567" />
          </div>
        </div>
        <div>
          <label for="password" class="block text-sm font-medium text-gray-700">كلمة المرور</label>
          <div class="relative">
            <i class="fas fa-lock absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" id="password" required class="w-full rounded-xl border border-gray-300 bg-gray-50/50 pl-4 pr-10 py-2.5 focus:ring-2 focus:ring-[#4B5563] focus:border-transparent transition" placeholder="••••••••" />
          </div>
        </div>
        <div>
          <label for="confirmPassword" class="block text-sm font-medium text-gray-700">تأكيد كلمة المرور</label>
          <div class="relative">
            <i class="fas fa-check-circle absolute right-3 top-1/2 -translate-y-1/2 text-gray-400"></i>
            <input type="password" id="confirmPassword" required class="w-full rounded-xl border border-gray-300 bg-gray-50/50 pl-4 pr-10 py-2.5 focus:ring-2 focus:ring-[#4B5563] focus:border-transparent transition" placeholder="••••••••" />
          </div>
        </div>
        <div class="flex items-center gap-2">
          <input type="checkbox" id="terms" required class="rounded border-gray-300 text-[#4B5563] focus:ring-[#4B5563]" />
          <label for="terms" class="text-sm text-gray-600">أوافق على <a href="/terms" class="text-[#4B5563] hover:underline">الشروط والأحكام</a> و <a href="/privacy-policy" class="text-[#4B5563] hover:underline">سياسة الخصوصية</a></label>
        </div>
        <button type="submit" class="w-full bg-[#4B5563] text-white py-2.5 rounded-xl hover:bg-[#3b4553] transition font-semibold shadow-md hover:shadow-lg">إنشاء الحساب</button>
      </form>

      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
        <div class="relative flex justify-center text-xs text-gray-400 bg-white/80 px-2">أو</div>
      </div>

      <button id="google-register" class="w-full border border-gray-300 py-2.5 rounded-xl hover:bg-gray-50 transition flex items-center justify-center gap-2 font-medium text-gray-700">
        <i class="fab fa-google text-red-500 text-lg"></i>
        التسجيل بواسطة Google
      </button>

      <p class="text-center text-sm text-gray-500 mt-6">
        لديك حساب بالفعل؟ <a href="/login" class="text-[#4B5563] font-semibold hover:underline">تسجيل الدخول</a>
      </p>
    </div>
  </div>

  <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
