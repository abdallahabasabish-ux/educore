<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>إنشاء حساب – مداد العلم</title>

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Inter:opsz,wght@14..32,300..700&family=Cairo:wght@300..700&display=swap" rel="stylesheet" />

    <!-- Tailwind -->
    <script src="https://cdn.tailwindcss.com"></script>

    <!-- Font Awesome -->
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0-beta3/css/all.min.css" />

    <!-- Lenis CSS -->
    <link rel="stylesheet" href="https://unpkg.com/lenis@1.1.13/dist/lenis.css" />

    <!-- Toastify -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />

    <!-- SweetAlert2 -->
    <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>

    <!-- Main CSS (Black & White Identity) -->
    <link rel="stylesheet" href="assets/css/style.css" />

    <style>
        /* ===== تنسيقات خاصة بصفحة التسجيل (أبيض وأسود) ===== */
        body {
            background: #f5f5f5;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 1rem;
            margin: 0;
        }
        .auth-card {
            background: #ffffff;
            border-radius: 20px;
            padding: 2rem 1.75rem;
            max-width: 480px;
            width: 100%;
            box-shadow: 0 16px 48px -12px rgba(0, 0, 0, 0.08);
            transition: all 0.3s ease;
            border: 1px solid #e5e5e5;
        }
        .auth-logo {
            text-align: center;
            margin-bottom: 1.75rem;
        }
        .auth-logo i {
            font-size: 2.2rem;
            color: #000000;
        }
        .auth-logo h1 {
            font-size: 1.5rem;
            font-weight: 800;
            margin-top: 0.25rem;
            color: #000000;
        }
        .auth-logo p {
            color: #555555;
            font-size: 0.875rem;
            margin-top: 0.25rem;
        }

        /* ===== الحقول ===== */
        .form-group {
            margin-bottom: 1.1rem;
        }
        .form-group label {
            display: block;
            font-size: 0.8rem;
            font-weight: 600;
            color: #000000;
            margin-bottom: 0.3rem;
        }
        .form-control {
            width: 100%;
            padding: 0.6rem 0.875rem;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            background: #fafafa;
            font-size: 0.9rem;
            transition: all 0.2s ease;
            color: #000000;
        }
        .form-control:focus {
            outline: none;
            border-color: #000000;
            background: #ffffff;
            box-shadow: 0 0 0 3px rgba(0, 0, 0, 0.05);
        }
        .form-control::placeholder {
            color: #aaaaaa;
        }

        /* ===== الأزرار ===== */
        .btn-primary {
            background: #000000;
            color: #ffffff;
            padding: 0.7rem 1.5rem;
            border-radius: 10px;
            font-weight: 600;
            font-size: 0.95rem;
            border: none;
            cursor: pointer;
            transition: all 0.3s ease;
            width: 100%;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            min-height: 48px;
        }
        .btn-primary:hover {
            background: #222222;
            transform: translateY(-2px);
            box-shadow: 0 8px 24px -6px rgba(0, 0, 0, 0.2);
        }
        .btn-primary:active {
            transform: scale(0.98);
        }
        .btn-primary:disabled {
            opacity: 0.5;
            cursor: not-allowed;
            transform: none;
        }

        .btn-google {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 0.5rem;
            width: 100%;
            padding: 0.7rem;
            border: 1.5px solid #e5e5e5;
            border-radius: 10px;
            background: #ffffff;
            font-weight: 500;
            font-size: 0.9rem;
            color: #000000;
            transition: all 0.2s ease;
            cursor: pointer;
            min-height: 48px;
        }
        .btn-google:hover {
            background: #f5f5f5;
            border-color: #000000;
        }
        .btn-google i {
            font-size: 1.2rem;
            color: #ea4335;
        }

        /* ===== الفاصل ===== */
        .divider {
            display: flex;
            align-items: center;
            gap: 1rem;
            margin: 1.5rem 0;
        }
        .divider::before,
        .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #e5e5e5;
        }
        .divider span {
            color: #888888;
            font-size: 0.8rem;
            font-weight: 500;
            white-space: nowrap;
        }

        /* ===== روابط ===== */
        .auth-footer {
            text-align: center;
            margin-top: 1.5rem;
            font-size: 0.9rem;
            color: #555555;
        }
        .auth-footer a {
            color: #000000;
            font-weight: 600;
            text-decoration: none;
        }
        .auth-footer a:hover {
            text-decoration: underline;
        }

        /* ===== رسائل ===== */
        .message-box {
            padding: 0.6rem 1rem;
            border-radius: 10px;
            font-size: 0.85rem;
            margin-top: 0.5rem;
            display: none;
        }
        .message-box.error {
            display: block;
            background: #fde8e8;
            color: #8a1a1a;
            border: 1px solid #fccccc;
        }
        .message-box.success {
            display: block;
            background: #e6f7e6;
            color: #0a5e0a;
            border: 1px solid #b8e6b8;
        }

        /* ===== خانة الموافقة على الشروط ===== */
        .terms-check {
            display: flex;
            align-items: flex-start;
            gap: 0.5rem;
            margin-top: 0.25rem;
        }
        .terms-check input[type="checkbox"] {
            width: 18px;
            height: 18px;
            margin-top: 2px;
            accent-color: #000000;
            flex-shrink: 0;
        }
        .terms-check label {
            font-size: 0.8rem;
            color: #555555;
            line-height: 1.5;
        }
        .terms-check a {
            color: #000000;
            text-decoration: none;
        }
        .terms-check a:hover {
            text-decoration: underline;
        }

        /* ===== تلميح الدور ===== */
        .role-hint {
            background: #f0f0f0;
            padding: 0.4rem 0.8rem;
            border-radius: 8px;
            font-size: 0.75rem;
            color: #333333;
            display: inline-flex;
            align-items: center;
            gap: 0.3rem;
            margin-top: 0.25rem;
        }

        /* ===== استجابة الهواتف ===== */
        @media (max-width: 480px) {
            .auth-card {
                padding: 1.5rem 1.25rem;
                border-radius: 16px;
            }
            .auth-logo i { font-size: 1.8rem; }
            .auth-logo h1 { font-size: 1.25rem; }
            .form-control { padding: 0.5rem 0.75rem; font-size: 0.85rem; }
            .btn-primary, .btn-google { font-size: 0.85rem; min-height: 44px; padding: 0.6rem 1rem; }
            .auth-footer { font-size: 0.8rem; }
        }
        @media (max-width: 360px) {
            .auth-card { padding: 1.25rem 1rem; }
            .auth-logo h1 { font-size: 1.1rem; }
            .auth-logo p { font-size: 0.75rem; }
            .btn-primary, .btn-google { font-size: 0.8rem; min-height: 40px; padding: 0.5rem 0.75rem; }
        }
        @media (min-width: 1024px) {
            .auth-card { padding: 2.5rem; max-width: 500px; }
            .auth-logo i { font-size: 2.5rem; }
            .auth-logo h1 { font-size: 1.75rem; }
        }
    </style>
</head>
<body>

    <!-- ======== بطاقة إنشاء حساب ======== -->
    <div class="auth-card">

        <div class="auth-logo">
            <i class="fas fa-feather-alt"></i>
            <h1>مداد العلم</h1>
            <p>أنشئ حسابك كمدرس</p>
        </div>

        <form id="registerForm" novalidate>

            <div class="form-group">
                <label for="registerName">الاسم الكامل</label>
                <input type="text" id="registerName" class="form-control" placeholder="أحمد محمد" required autocomplete="name" />
            </div>

            <div class="form-group">
                <label for="registerAcademy">اسم الأكاديمية</label>
                <input type="text" id="registerAcademy" class="form-control" placeholder="أكاديمية المستقبل" required autocomplete="organization" />
            </div>

            <div class="form-group">
                <label for="registerEmail">البريد الإلكتروني</label>
                <input type="email" id="registerEmail" class="form-control" placeholder="example@email.com" required autocomplete="email" />
            </div>

            <div class="form-group">
                <label for="registerPhone">رقم الهاتف</label>
                <input type="tel" id="registerPhone" class="form-control" placeholder="+966 55 123 4567" autocomplete="tel" />
            </div>

            <div class="form-group">
                <label for="registerPassword">كلمة المرور</label>
                <input type="password" id="registerPassword" class="form-control" placeholder="••••••••" required autocomplete="new-password" minlength="6" />
            </div>

            <div class="form-group">
                <label for="registerConfirm">تأكيد كلمة المرور</label>
                <input type="password" id="registerConfirm" class="form-control" placeholder="••••••••" required autocomplete="new-password" minlength="6" />
            </div>

            <div class="terms-check">
                <input type="checkbox" id="registerTerms" required />
                <label for="registerTerms">
                    أوافق على <a href="terms.html" target="_blank">الشروط والأحكام</a> و <a href="privacy-policy.html" target="_blank">سياسة الخصوصية</a>
                </label>
            </div>

            <!-- تلميح: سيتم إنشاء الحساب كـ مدرس -->
            <div class="role-hint">
                <i class="fas fa-chalkboard-teacher"></i>
                سيتم إنشاء حسابك كمدرس (Teacher)
            </div>

            <div id="registerMessage" class="message-box"></div>

            <button type="submit" class="btn-primary" id="registerBtn">
                <i class="fas fa-user-plus"></i> إنشاء الحساب
            </button>

        </form>

        <div class="divider"><span>أو</span></div>

        <button id="googleRegisterBtn" class="btn-google">
            <i class="fab fa-google"></i> التسجيل عبر Google
        </button>

        <div class="auth-footer">
            لديك حساب بالفعل؟ <a href="login.html">تسجيل الدخول</a>
        </div>

    </div>

    <!-- ======== SCRIPTS ======== -->
    <script src="https://unpkg.com/lenis@1.1.13/dist/lenis.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

    <script type="importmap">
        {
            "imports": {
                "firebase/app": "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js",
                "firebase/auth": "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js",
                "firebase/firestore": "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js",
                "firebase/storage": "https://www.gstatic.com/firebasejs/10.7.1/firebase-storage.js"
            }
        }
    </script>

    <script type="module">
        // ============================================================
        // register.js – إنشاء حساب مع صلاحيات مدرس (Teacher)
        // ============================================================

        import { initializeApp } from "firebase/app";
        import {
            getAuth,
            createUserWithEmailAndPassword,
            signInWithPopup,
            GoogleAuthProvider,
            setPersistence,
            browserLocalPersistence,
        } from "firebase/auth";
        import {
            getFirestore,
            doc,
            setDoc,
            serverTimestamp,
        } from "firebase/firestore";

        const firebaseConfig = {
            apiKey: "AIzaSyBsSP8Le5_nDG2YFiyGcZ6BFR7aLi3djLU",
            authDomain: "edu-core-ddb48.firebaseapp.com",
            projectId: "edu-core-ddb48",
            storageBucket: "edu-core-ddb48.firebasestorage.app",
            messagingSenderId: "4743644287",
            appId: "1:4743644287:web:9167749cc80417b6876b4a",
            measurementId: "G-S94FBCFCXW"
        };

        const app = initializeApp(firebaseConfig);
        const auth = getAuth(app);
        const db = getFirestore(app);

        const registerForm = document.getElementById('registerForm');
        const messageEl = document.getElementById('registerMessage');
        const registerBtn = document.getElementById('registerBtn');

        const nameInput = document.getElementById('registerName');
        const academyInput = document.getElementById('registerAcademy');
        const emailInput = document.getElementById('registerEmail');
        const phoneInput = document.getElementById('registerPhone');
        const passwordInput = document.getElementById('registerPassword');
        const confirmInput = document.getElementById('registerConfirm');
        const termsCheck = document.getElementById('registerTerms');

        function showMessage(text, type = 'error') {
            messageEl.textContent = text;
            messageEl.className = `message-box ${type}`;
            clearTimeout(messageEl._timeout);
            messageEl._timeout = setTimeout(() => {
                messageEl.className = 'message-box';
                messageEl.textContent = '';
            }, 5000);
        }

        function setLoading(isLoading) {
            if (isLoading) {
                registerBtn.disabled = true;
                registerBtn.innerHTML = '<i class="fas fa-spinner fa-spin"></i> جاري التحميل...';
            } else {
                registerBtn.disabled = false;
                registerBtn.innerHTML = '<i class="fas fa-user-plus"></i> إنشاء الحساب';
            }
        }

        registerForm.addEventListener('submit', async (e) => {
            e.preventDefault();

            const name = nameInput.value.trim();
            const academy = academyInput.value.trim();
            const email = emailInput.value.trim();
            const phone = phoneInput.value.trim();
            const password = passwordInput.value;
            const confirm = confirmInput.value;
            const terms = termsCheck.checked;

            if (!name || !academy || !email || !password || !confirm) {
                showMessage('يرجى ملء جميع الحقول المطلوبة', 'error');
                return;
            }
            if (password.length < 6) {
                showMessage('كلمة المرور يجب أن تكون 6 أحرف على الأقل', 'error');
                return;
            }
            if (password !== confirm) {
                showMessage('كلمات المرور غير متطابقة', 'error');
                return;
            }
            if (!terms) {
                showMessage('يجب الموافقة على الشروط والأحكام', 'error');
                return;
            }
            const emailRegex = /^[^\s@]+@[^\s@]+\.[^\s@]+$/;
            if (!emailRegex.test(email)) {
                showMessage('البريد الإلكتروني غير صحيح', 'error');
                return;
            }

            try {
                await setPersistence(auth, browserLocalPersistence);
            } catch (error) {
                console.warn('فشل تعيين الجلسة:', error);
            }

            setLoading(true);

            try {
                // 1. إنشاء المستخدم في Authentication
                const userCredential = await createUserWithEmailAndPassword(auth, email, password);
                const user = userCredential.user;

                // 2. حفظ بيانات المستخدم في Firestore مع دور "teacher"
                const userData = {
                    fullName: name,
                    academyName: academy,
                    email: email,
                    phone: phone || '',
                    role: 'teacher',  // ✅ الصلاحية: مدرس (وليس owner)
                    status: 'active',
                    academyId: user.uid, // يستخدم كمعرف للأكاديمية
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                };

                await setDoc(doc(db, 'users', user.uid), userData);

                // 3. إنشاء وثيقة الأكاديمية
                const academyData = {
                    academyName: academy,
                    ownerId: user.uid,
                    status: 'active',
                    language: 'ar',
                    currency: 'SAR',
                    createdAt: serverTimestamp(),
                    updatedAt: serverTimestamp(),
                };
                await setDoc(doc(db, 'academies', user.uid), academyData);

                showMessage('تم إنشاء الحساب بنجاح! جاري التوجيه...', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                let msg = 'فشل إنشاء الحساب';
                if (error.code === 'auth/email-already-in-use') {
                    msg = 'البريد الإلكتروني مستخدم بالفعل';
                } else if (error.code === 'auth/invalid-email') {
                    msg = 'البريد الإلكتروني غير صحيح';
                } else if (error.code === 'auth/weak-password') {
                    msg = 'كلمة المرور ضعيفة جداً';
                } else if (error.code === 'auth/operation-not-allowed') {
                    msg = 'طريقة التسجيل غير مفعلة في Firebase';
                } else if (error.code === 'auth/network-request-failed') {
                    msg = 'فشل الاتصال بالشبكة، تأكد من اتصال الإنترنت';
                } else {
                    msg = error.message;
                }
                showMessage(msg, 'error');
            } finally {
                setLoading(false);
            }
        });

        // ===== التسجيل عبر Google (مع دور مدرس) =====
        document.getElementById('googleRegisterBtn').addEventListener('click', async () => {
            const provider = new GoogleAuthProvider();

            try {
                await setPersistence(auth, browserLocalPersistence);
            } catch (error) {
                console.warn('فشل تعيين الجلسة:', error);
            }

            setLoading(true);

            try {
                const result = await signInWithPopup(auth, provider);
                const user = result.user;

                // التحقق من وجود المستخدم في Firestore
                const userDoc = await getDoc(doc(db, 'users', user.uid));
                if (!userDoc.exists()) {
                    // إنشاء مستخدم جديد مع دور مدرس
                    const userData = {
                        fullName: user.displayName || 'مستخدم',
                        email: user.email,
                        avatar: user.photoURL || '',
                        role: 'teacher',  // ✅ الصلاحية: مدرس
                        status: 'active',
                        academyId: user.uid,
                        academyName: 'أكاديميتي',
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp(),
                    };
                    await setDoc(doc(db, 'users', user.uid), userData);

                    const academyData = {
                        academyName: 'أكاديميتي',
                        ownerId: user.uid,
                        status: 'active',
                        language: 'ar',
                        currency: 'SAR',
                        createdAt: serverTimestamp(),
                        updatedAt: serverTimestamp(),
                    };
                    await setDoc(doc(db, 'academies', user.uid), academyData);
                }

                showMessage('تم التسجيل بواسطة Google بنجاح!', 'success');
                setTimeout(() => {
                    window.location.href = 'dashboard.html';
                }, 1500);

            } catch (error) {
                let msg = 'فشل التسجيل عبر Google';
                if (error.code === 'auth/popup-closed-by-user') {
                    msg = 'تم إغلاق النافذة المنبثقة قبل إكمال التسجيل';
                } else if (error.code === 'auth/cancelled-popup-request') {
                    msg = 'تم إلغاء طلب التسجيل';
                } else if (error.code === 'auth/account-exists-with-different-credential') {
                    msg = 'يوجد حساب بنفس البريد الإلكتروني باستخدام طريقة أخرى';
                } else {
                    msg = error.message;
                }
                showMessage(msg, 'error');
            } finally {
                setLoading(false);
            }
        });

        // ===== إزالة الرسائل عند الكتابة =====
        const allInputs = [nameInput, academyInput, emailInput, phoneInput, passwordInput, confirmInput];
        allInputs.forEach(input => {
            input.addEventListener('input', () => {
                if (messageEl.className !== 'message-box') {
                    messageEl.className = 'message-box';
                    messageEl.textContent = '';
                }
            });
        });

        // ===== Lenis Smooth Scroll =====
        const lenis = new Lenis({
            duration: 1.2,
            easing: (t) => Math.min(1, 1.001 - Math.pow(2, -10 * t)),
            orientation: 'vertical',
            gestureOrientation: 'vertical',
            smoothWheel: true,
            wheelMultiplier: 1,
            touchMultiplier: 2,
        });

        function raf(time) {
            lenis.raf(time);
            requestAnimationFrame(raf);
        }
        requestAnimationFrame(raf);

        console.log('✅ مداد العلم — صفحة إنشاء حساب (مدرس) جاهزة');
    </script>

</body>
</html>
