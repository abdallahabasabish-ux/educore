<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>إنشاء حساب – EduCore</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/style.css" />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Cairo:wght@400;500;600;700;800&display=swap" rel="stylesheet" />
</head>
<body class="bg-gradient-to-br from-gray-50 via-white to-gray-100 flex items-center justify-center min-h-screen p-4">
  <div class="w-full max-w-md">
    <div class="bg-white/80 backdrop-blur-xl rounded-3xl shadow-2xl border border-gray-200/50 p-8">
      <div class="text-center mb-8">
        <a href="/" class="inline-block text-3xl font-extrabold text-[#4B5563]">EduCore</a>
        <h2 class="text-xl font-bold mt-2">إنشاء حساب جديد</h2>
        <p class="text-sm text-gray-500">ابدأ رحلتك معنا</p>
      </div>
      <form id="register-form" class="space-y-5">
        <div>
          <label class="block text-sm font-medium text-gray-700">الاسم الكامل</label>
          <input type="text" id="fullName" required class="mt-1 w-full rounded-xl border border-gray-300 px-4 py-2.5 focus:ring-2 focus:ring-[#4B5563] focus:border-transparent transition" placeholder="أحمد محمد" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">البريد الإلكتروني</label>
          <input type="email" id="email" required class="mt-1 w-full rounded-xl border border-gray-300 px-4 py-2.5 focus:ring-2 focus:ring-[#4B5563] focus:border-transparent transition" placeholder="example@email.com" />
        </div>
        <div>
          <label class="block text-sm font-medium text-gray-700">كلمة المرور</label>
          <input type="password" id="password" required class="mt-1 w-full rounded-xl border border-gray-300 px-4 py-2.5 focus:ring-2 focus:ring-[#4B5563] focus:border-transparent transition" placeholder="••••••••" />
        </div>
        <button type="submit" class="w-full bg-[#4B5563] text-white py-2.5 rounded-xl font-semibold hover:bg-[#3a4452] shadow-md hover:shadow-lg transition-all duration-200">إنشاء الحساب</button>
      </form>
      <div class="relative my-6">
        <div class="absolute inset-0 flex items-center"><div class="w-full border-t border-gray-200"></div></div>
        <div class="relative flex justify-center text-xs text-gray-400 bg-white px-2">أو</div>
      </div>
      <button id="google-register" class="w-full border border-gray-300 py-2.5 rounded-xl hover:bg-gray-50 transition-all duration-200 flex items-center justify-center gap-3 font-medium text-gray-700">
        <svg class="w-5 h-5" viewBox="0 0 24 24"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92a5.06 5.06 0 0 1-2.2 3.32v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.1z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l2.85-2.22.81-.62z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
        التسجيل بواسطة Google
      </button>
      <p class="text-center text-sm text-gray-500 mt-4">لديك حساب بالفعل؟ <a href="/login" class="text-[#4B5563] font-semibold hover:underline">تسجيل الدخول</a></p>
    </div>
  </div>
  <script type="module" src="assets/js/auth.js"></script>
</body>
</html>
