<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>الطلاب – مداد العلم</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />
  <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/toastify-js/src/toastify.min.css" />
  <script src="https://cdn.jsdelivr.net/npm/sweetalert2@11"></script>
  <script src="https://cdn.jsdelivr.net/npm/toastify-js"></script>

  <style>
    /* تنسيقات القائمة الجانبية والمودال */
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { font-family: 'Inter', 'Cairo', sans-serif; direction: rtl; background: #f8fafc; }
    .sidebar {
      transition: transform 0.3s ease;
      transform: translateX(100%);
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      height: 100%;
      background: white;
      border-left: 1px solid #e5e7eb;
      padding: 1.5rem;
      overflow-y: auto;
      z-index: 40;
    }
    .sidebar.open { transform: translateX(0); }
    @media (min-width: 768px) {
      .sidebar { transform: translateX(0) !important; position: fixed; top: 0; right: 0; width: 280px; height: 100%; border-left: 1px solid #e5e7eb; padding: 1.5rem; overflow-y: auto; z-index: 40; background: white; }
      .sidebar-overlay { display: none !important; }
    }
    .sidebar-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 39; display: none; }
    .sidebar-overlay.show { display: block; }
    .sidebar-link { display: block; padding: 0.625rem 1rem; border-radius: 0.75rem; transition: all 0.2s; color: #4b5563; text-decoration: none; font-size: 0.9rem; }
    .sidebar-link:hover { background: #f3f4f6; }
    .sidebar-link.active { background: #4b5563; color: white; }
    .sidebar-link i { width: 1.5rem; text-align: center; margin-left: 0.5rem; }
    .main-content { margin-right: 0; padding: 1.5rem; min-height: 100vh; }
    @media (min-width: 768px) { .main-content { margin-right: 280px; padding: 2rem; } }
    .form-input { width: 100%; padding: 0.5rem 1rem; border: 1px solid #e5e7eb; border-radius: 0.75rem; background: #f9fafb; transition: all 0.2s; font-size: 0.9rem; }
    .form-input:focus { outline: none; border-color: #4b5563; box-shadow: 0 0 0 3px rgba(75,85,99,0.15); background: white; }
    .modal-overlay { position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 50; display: none; align-items: center; justify-content: center; padding: 1rem; }
    .modal-overlay.show { display: flex; }
    .modal-box { background: white; border-radius: 1.5rem; padding: 2rem; max-width: 550px; width: 100%; max-height: 90vh; overflow-y: auto; }
    .btn-primary { background: #4b5563; color: white; padding: 0.5rem 1.5rem; border-radius: 0.75rem; font-weight: 600; transition: all 0.3s; border: none; cursor: pointer; }
    .btn-primary:hover { background: #3b4553; transform: translateY(-2px); box-shadow: 0 8px 16px -4px rgba(75,85,99,0.3); }
    .btn-danger { background: #ef4444; color: white; padding: 0.5rem 1.5rem; border-radius: 0.75rem; font-weight: 600; transition: all 0.3s; border: none; cursor: pointer; }
    .btn-danger:hover { background: #dc2626; }
    .status-badge { padding: 0.25rem 0.75rem; border-radius: 9999px; font-size: 0.75rem; font-weight: 600; }
    .status-active { background: #d1fae5; color: #065f46; }
    .status-inactive { background: #fee2e2; color: #dc2626; }
    .status-pending { background: #fef3c7; color: #92400e; }
  </style>
</head>
<body>

  <!-- ===== القائمة الجانبية ===== -->
  <div id="sidebar-overlay" class="sidebar-overlay"></div>
  <div id="sidebar" class="sidebar">
    <div class="flex justify-between items-center mb-8 md:hidden">
      <a href="index.html" class="text-2xl font-extrabold text-[#4B5563]"><i class="fas fa-feather-alt ml-2"></i>مداد العلم</a>
      <button id="close-sidebar" class="text-gray-500 hover:text-gray-700 text-xl"><i class="fas fa-times"></i></button>
    </div>
    <a href="index.html" class="text-2xl font-extrabold text-[#4B5563] block mb-8 hidden md:block"><i class="fas fa-feather-alt ml-2"></i>مداد العلم</a>
    <nav class="space-y-1">
      <a href="dashboard.html" class="sidebar-link"><i class="fas fa-chart-pie ml-2"></i>لوحة التحكم</a>
      <a href="students.html" class="sidebar-link active"><i class="fas fa-user-graduate ml-2"></i>الطلاب</a>
      <a href="courses.html" class="sidebar-link"><i class="fas fa-book-open ml-2"></i>الكورسات</a>
      <a href="classes.html" class="sidebar-link"><i class="fas fa-calendar-check ml-2"></i>الحصص</a>
      <a href="teachers.html" class="sidebar-link"><i class="fas fa-chalkboard-teacher ml-2"></i>المدرسون</a>
      <a href="materials.html" class="sidebar-link"><i class="fas fa-file-alt ml-2"></i>المواد</a>
      <a href="enrollments.html" class="sidebar-link"><i class="fas fa-user-plus ml-2"></i>التسجيلات</a>
      <a href="exams.html" class="sidebar-link"><i class="fas fa-pencil-alt ml-2"></i>الامتحانات</a>
      <a href="assignments.html" class="sidebar-link"><i class="fas fa-tasks ml-2"></i>الواجبات</a>
      <a href="finance.html" class="sidebar-link"><i class="fas fa-coins ml-2"></i>المالية</a>
      <a href="reports.html" class="sidebar-link"><i class="fas fa-chart-bar ml-2"></i>التقارير</a>
      <a href="settings.html" class="sidebar-link"><i class="fas fa-cog ml-2"></i>الإعدادات</a>
      <a href="profile.html" class="sidebar-link"><i class="fas fa-user ml-2"></i>الملف الشخصي</a>
      <button id="logout-btn" class="sidebar-link text-red-600 hover:bg-red-50 w-full text-right"><i class="fas fa-sign-out-alt ml-2"></i>تسجيل الخروج</button>
    </nav>
  </div>

  <!-- ===== المحتوى الرئيسي ===== -->
  <div class="main-content">
    <div class="flex justify-between items-center mb-6 md:hidden">
      <button id="open-sidebar" class="text-gray-600 hover:text-[#4B5563] text-2xl"><i class="fas fa-bars"></i></button>
      <a href="index.html" class="text-xl font-extrabold text-[#4B5563]"><i class="fas fa-feather-alt ml-2"></i>مداد العلم</a>
      <div></div>
    </div>

    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">إدارة الطلاب</h1>
      <button id="add-student-btn" class="btn-primary flex items-center gap-2"><i class="fas fa-plus"></i> إضافة طالب</button>
    </div>

    <!-- جدول الطلاب -->
    <div class="bg-white rounded-xl shadow-sm border border-gray-200 overflow-hidden">
      <div class="overflow-x-auto">
        <table class="w-full">
          <thead class="bg-gray-50 border-b border-gray-200">
            <tr>
              <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">#</th>
              <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">الاسم</th>
              <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">البريد الإلكتروني</th>
              <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">الهاتف</th>
              <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">الكورس</th>
              <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">الحالة</th>
              <th class="px-6 py-3 text-right text-xs font-medium text-gray-500 uppercase">الإجراءات</th>
            </tr>
          </thead>
          <tbody id="students-table-body" class="divide-y divide-gray-200">
            <tr><td colspan="7" class="px-6 py-4 text-center text-gray-500">جاري التحميل...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>

  <!-- ===== مودال إضافة/تعديل طالب ===== -->
  <div id="student-modal" class="modal-overlay">
    <div class="modal-box">
      <div class="flex justify-between items-center mb-4">
        <h2 id="modal-title" class="text-xl font-bold">إضافة طالب جديد</h2>
        <button id="close-modal" class="text-gray-500 hover:text-gray-700 text-xl"><i class="fas fa-times"></i></button>
      </div>
      <form id="student-form">
        <input type="hidden" id="student-id" />
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700">الاسم الكامل</label>
          <input type="text" id="student-name" class="form-input" placeholder="أحمد محمد" required />
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700">البريد الإلكتروني</label>
          <input type="email" id="student-email" class="form-input" placeholder="example@email.com" required />
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700">رقم الهاتف</label>
          <input type="tel" id="student-phone" class="form-input" placeholder="+966 55 123 4567" />
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700">الكورس</label>
          <input type="text" id="student-course" class="form-input" placeholder="مقدمة في البرمجة" />
        </div>
        <div class="mb-3">
          <label class="block text-sm font-medium text-gray-700">الحالة</label>
          <select id="student-status" class="form-input">
            <option value="active">نشط</option>
            <option value="inactive">غير نشط</option>
            <option value="pending">معلق</option>
          </select>
        </div>
        <button type="submit" class="btn-primary w-full">حفظ</button>
      </form>
    </div>
  </div>

  <script>
    // القائمة الجانبية
    document.addEventListener("DOMContentLoaded", function () {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("sidebar-overlay");
      const openBtn = document.getElementById("open-sidebar");
      const closeBtn = document.getElementById("close-sidebar");
      function openSidebar() { sidebar.classList.add("open"); overlay.classList.add("show"); document.body.style.overflow = "hidden"; }
      function closeSidebar() { sidebar.classList.remove("open"); overlay.classList.remove("show"); document.body.style.overflow = ""; }
      if (openBtn) openBtn.addEventListener("click", openSidebar);
      if (closeBtn) closeBtn.addEventListener("click", closeSidebar);
      if (overlay) overlay.addEventListener("click", closeSidebar);
      document.querySelectorAll("#sidebar a").forEach(link => link.addEventListener("click", closeSidebar));

      // المودال
      const modal = document.getElementById("student-modal");
      const closeModalBtn = document.getElementById("close-modal");
      const addBtn = document.getElementById("add-student-btn");
      if (addBtn) addBtn.addEventListener("click", () => {
        document.getElementById("student-id").value = "";
        document.getElementById("student-name").value = "";
        document.getElementById("student-email").value = "";
        document.getElementById("student-phone").value = "";
        document.getElementById("student-course").value = "";
        document.getElementById("student-status").value = "active";
        document.getElementById("modal-title").textContent = "إضافة طالب جديد";
        modal.classList.add("show");
      });
      if (closeModalBtn) closeModalBtn.addEventListener("click", () => modal.classList.remove("show"));
      modal.addEventListener("click", (e) => { if (e.target === modal) modal.classList.remove("show"); });
    });
  </script>

  <script type="module" src="assets/js/pages/students.js"></script>
</body>
</html>
