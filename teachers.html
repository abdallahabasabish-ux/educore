<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>المدرسون – مداد العلم</title>

  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css"/>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&family=Cairo:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <link rel="stylesheet" href="assets/css/style.css" />

  <style>
    /* نفس التنسيقات السابقة */
    .sidebar {
      transition: transform 0.3s ease;
      transform: translateX(100%);
      position: fixed;
      top: 0;
      right: 0;
      width: 280px;
      height: 100%;
      background: white;
      border-left: 1px solid #e5e7eb;
      padding: 1.5rem;
      overflow-y: auto;
      z-index: 40;
    }
    .sidebar.open {
      transform: translateX(0);
    }
    @media (min-width: 768px) {
      .sidebar {
        transform: translateX(0) !important;
        position: fixed;
        top: 0;
        right: 0;
        width: 280px;
        height: 100%;
        border-left: 1px solid #e5e7eb;
        padding: 1.5rem;
        overflow-y: auto;
        z-index: 40;
        background: white;
      }
      .sidebar-overlay {
        display: none !important;
      }
    }
    .sidebar-overlay {
      position: fixed;
      inset: 0;
      background: rgba(0, 0, 0, 0.5);
      z-index: 39;
      display: none;
    }
    .sidebar-overlay.show {
      display: block;
    }
    .sidebar-link {
      display: block;
      padding: 0.625rem 1rem;
      border-radius: 0.75rem;
      transition: all 0.2s;
      color: #4b5563;
      text-decoration: none;
      font-size: 0.9rem;
    }
    .sidebar-link:hover {
      background: #f3f4f6;
    }
    .sidebar-link.active {
      background: #4b5563;
      color: white;
    }
    .sidebar-link i {
      width: 1.5rem;
      text-align: center;
      margin-left: 0.5rem;
    }
    .main-content {
      margin-right: 0;
      padding: 1.5rem;
      min-height: 100vh;
    }
    @media (min-width: 768px) {
      .main-content {
        margin-right: 280px;
        padding: 2rem;
      }
    }
    .teacher-card {
      transition: all 0.3s ease;
    }
    .teacher-card:hover {
      transform: translateY(-4px);
      box-shadow: 0 12px 30px -8px rgba(0,0,0,0.1);
    }
  </style>
</head>
<body>

  <div id="sidebar-overlay" class="sidebar-overlay"></div>

  <div id="sidebar" class="sidebar">
    <div class="flex justify-between items-center mb-8 md:hidden">
      <a href="index.html" class="text-2xl font-extrabold text-[#4B5563]"><i class="fas fa-feather-alt ml-2"></i>مداد العلم</a>
      <button id="close-sidebar" class="text-gray-500 hover:text-gray-700 text-xl"><i class="fas fa-times"></i></button>
    </div>
    <a href="index.html" class="text-2xl font-extrabold text-[#4B5563] block mb-8 hidden md:block"><i class="fas fa-feather-alt ml-2"></i>مداد العلم</a>
    <nav class="space-y-1">
      <a href="dashboard.html" class="sidebar-link"><i class="fas fa-chart-pie ml-2"></i>لوحة التحكم</a>
      <a href="students.html" class="sidebar-link"><i class="fas fa-user-graduate ml-2"></i>الطلاب</a>
      <a href="courses.html" class="sidebar-link"><i class="fas fa-book-open ml-2"></i>الكورسات</a>
      <a href="classes.html" class="sidebar-link"><i class="fas fa-calendar-check ml-2"></i>الحصص</a>
      <a href="teachers.html" class="sidebar-link active"><i class="fas fa-chalkboard-teacher ml-2"></i>المدرسون</a>
      <a href="materials.html" class="sidebar-link"><i class="fas fa-file-alt ml-2"></i>المواد</a>
      <a href="enrollments.html" class="sidebar-link"><i class="fas fa-user-plus ml-2"></i>التسجيلات</a>
      <a href="exams.html" class="sidebar-link"><i class="fas fa-pencil-alt ml-2"></i>الامتحانات</a>
      <a href="assignments.html" class="sidebar-link"><i class="fas fa-tasks ml-2"></i>الواجبات</a>
      <a href="finance.html" class="sidebar-link"><i class="fas fa-coins ml-2"></i>المالية</a>
      <a href="reports.html" class="sidebar-link"><i class="fas fa-chart-bar ml-2"></i>التقارير</a>
      <a href="settings.html" class="sidebar-link"><i class="fas fa-cog ml-2"></i>الإعدادات</a>
      <a href="profile.html" class="sidebar-link"><i class="fas fa-user ml-2"></i>الملف الشخصي</a>
      <button id="logout-btn" class="sidebar-link text-red-600 hover:bg-red-50 w-full text-right"><i class="fas fa-sign-out-alt ml-2"></i>تسجيل الخروج</button>
    </nav>
  </div>

  <div class="main-content">
    <div class="flex justify-between items-center mb-6 md:hidden">
      <button id="open-sidebar" class="text-gray-600 hover:text-[#4B5563] text-2xl"><i class="fas fa-bars"></i></button>
      <a href="index.html" class="text-xl font-extrabold text-[#4B5563]"><i class="fas fa-feather-alt ml-2"></i>مداد العلم</a>
      <div></div>
    </div>

    <div class="flex justify-between items-center mb-6">
      <h1 class="text-2xl font-bold">إدارة المدرسين</h1>
      <button id="add-teacher-btn" class="bg-[#4B5563] text-white px-4 py-2 rounded-xl hover:bg-[#3b4553] transition flex items-center gap-2">
        <i class="fas fa-plus"></i> إضافة مدرس
      </button>
    </div>

    <!-- بطاقات المدرسين -->
    <div id="teachers-grid" class="grid grid-cols-1 md:grid-cols-2 lg:grid-cols-3 gap-6">
      <div class="col-span-full text-center text-gray-500 py-8">جاري التحميل...</div>
    </div>
  </div>

  <script src="https://unpkg.com/aos@2.3.1/dist/aos.js"></script>
  <script>
    AOS.init({ duration: 800, once: true });

    document.addEventListener("DOMContentLoaded", function () {
      const sidebar = document.getElementById("sidebar");
      const overlay = document.getElementById("sidebar-overlay");
      const openBtn = document.getElementById("open-sidebar");
      const closeBtn = document.getElementById("close-sidebar");

      function openSidebar() { sidebar.classList.add("open"); overlay.classList.add("show"); document.body.style.overflow = "hidden"; }
      function closeSidebar() { sidebar.classList.remove("open"); overlay.classList.remove("show"); document.body.style.overflow = ""; }

      if (openBtn) openBtn.addEventListener("click", openSidebar);
      if (closeBtn) closeBtn.addEventListener("click", closeSidebar);
      if (overlay) overlay.addEventListener("click", closeSidebar);
      document.querySelectorAll("#sidebar a").forEach((link) => link.addEventListener("click", closeSidebar));
    });
  </script>

  <script type="module" src="assets/js/pages/teachers.js"></script>
</body>
</html>
